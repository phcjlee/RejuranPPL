<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPL Guide Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  :root {
    --primary:#8B5CF6;--primary-light:#C4B5FD;--primary-dark:#7C3AED;--primary-bg:#F5F3FF;
    --accent:#EC4899;--accent-light:#FBCFE8;--accent2:#06B6D4;
    --bg:#FAFAFE;--card:#FFFFFF;--text:#1E1B4B;--text-light:#64748B;--text-muted:#94A3B8;--border:#E2E8F0;
    --success:#10B981;--warning:#F59E0B;--danger:#EF4444;--rose:#F43F5E;
    --shadow:0 1px 3px rgba(0,0,0,0.04),0 4px 20px rgba(0,0,0,0.04);
    --shadow-hover:0 8px 40px rgba(139,92,246,0.12);
    --radius:20px;--radius-sm:12px;--radius-xs:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

  body.viewer-mode .sidebar,body.viewer-mode .mobile-toggle{display:none!important;}
  body.viewer-mode .main{margin-left:0;max-width:960px;margin:0 auto;padding:32px 24px;}
  body.viewer-mode .btn-edit-only{display:none!important;}
  .viewer-watermark{display:none;text-align:center;padding:16px;margin-bottom:24px;background:linear-gradient(135deg,var(--primary-bg),#FCE7F3);border-radius:var(--radius-sm);font-size:13px;color:var(--primary-dark);font-weight:600;}
  body.viewer-mode .viewer-watermark{display:block;}
  body.viewer-mode .detail-back{display:none!important;}

  .sidebar{position:fixed;left:0;top:0;width:270px;height:100vh;background:linear-gradient(180deg,#1E1B4B 0%,#312E81 50%,#3B0764 100%);padding:24px 16px;z-index:100;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
  .sidebar-logo{display:flex;align-items:center;gap:14px;padding:4px 8px 24px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:24px;}
  .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(139,92,246,.3);}
  .sidebar-logo h1{color:#fff;font-size:17px;font-weight:800;letter-spacing:-.5px;}
  .sidebar-logo span{color:var(--primary-light);font-size:11px;font-weight:500;display:block;margin-top:2px;}
  .nav-section{margin-bottom:28px;}
  .nav-title{color:rgba(255,255,255,.3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:0 14px;margin-bottom:10px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-size:13.5px;font-weight:500;margin-bottom:2px;}
  .nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);}
  .nav-item.active{background:rgba(139,92,246,.25);color:#fff;font-weight:600;box-shadow:inset 0 0 0 1px rgba(139,92,246,.3);}
  .nav-item .icon{font-size:17px;width:24px;text-align:center;}
  .nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;min-width:22px;text-align:center;}
  .sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.06);}
  .lang-toggle{display:flex;gap:4px;padding:8px 14px;}
  .lang-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .2s;}
  .lang-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

  .main{margin-left:270px;min-height:100vh;padding:32px 44px;max-width:1400px;}
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
  .page-header h2{font-size:28px;font-weight:900;letter-spacing:-.8px;}
  .page-header p{color:var(--text-light);font-size:14px;margin-top:6px;}
  .header-actions{display:flex;gap:10px;align-items:center;}

  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;border:none;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap;}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 4px 16px rgba(139,92,246,.3);}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(139,92,246,.4);}
  .btn-accent{background:linear-gradient(135deg,var(--accent),#DB2777);color:#fff;}
  .btn-outline{background:var(--card);color:var(--text);border:1.5px solid var(--border);}
  .btn-outline:hover{border-color:var(--primary-light);color:var(--primary);}
  .btn-sm{padding:7px 14px;font-size:12px;border-radius:var(--radius-xs);}
  .btn-xs{padding:5px 10px;font-size:11px;border-radius:6px;}
  .btn-ghost{background:transparent;color:var(--text-light);border:none;}
  .btn-ghost:hover{color:var(--primary);background:var(--primary-bg);}
  .btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{background:#DC2626;}
  .btn-success{background:var(--success);color:#fff;}

  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:36px;}
  .stat-card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);transition:transform .2s;position:relative;overflow:hidden;}
  .stat-card:hover{transform:translateY(-2px);}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .stat-card:nth-child(1)::before{background:linear-gradient(90deg,var(--primary),var(--accent));}
  .stat-card:nth-child(2)::before{background:linear-gradient(90deg,var(--success),#34D399);}
  .stat-card:nth-child(3)::before{background:linear-gradient(90deg,var(--warning),#FBBF24);}
  .stat-card:nth-child(4)::before{background:linear-gradient(90deg,var(--text-muted),#CBD5E1);}
  .stat-icon{width:42px;height:42px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px;}
  .stat-card:nth-child(1) .stat-icon{background:var(--primary-bg);}
  .stat-card:nth-child(2) .stat-icon{background:#ECFDF5;}
  .stat-card:nth-child(3) .stat-icon{background:#FFFBEB;}
  .stat-card:nth-child(4) .stat-icon{background:#F1F5F9;}
  .stat-value{font-size:30px;font-weight:900;letter-spacing:-1px;}
  .stat-label{font-size:13px;color:var(--text-light);font-weight:500;margin-top:2px;}

  .toolbar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
  .search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 16px;flex:1;min-width:220px;transition:border-color .2s,box-shadow .2s;}
  .search-box:focus-within{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(139,92,246,.08);}
  .search-box input{border:none;outline:none;font-size:14px;font-family:inherit;width:100%;background:transparent;}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;width:100%;}
  .filter-label{font-size:12px;font-weight:700;color:var(--text-muted);white-space:nowrap;}
  .pill{padding:7px 16px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text-light);transition:all .15s;}
  .pill:hover{border-color:var(--primary-light);color:var(--primary);}
  .pill.active{background:var(--primary);border-color:var(--primary);color:#fff;}
  .pill-country.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}

  .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;}
  .product-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;transition:all .25s;cursor:pointer;}
  .product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);border-color:var(--primary-light);}
  .product-thumb{width:100%;height:180px;position:relative;overflow:hidden;}
  .product-thumb img{width:100%;height:100%;object-fit:cover;}
  .product-thumb-placeholder{background:linear-gradient(135deg,#EDE9FE 0%,#FCE7F3 50%,#E0F2FE 100%);display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:48px;opacity:.7;}
  .card-badges{position:absolute;top:12px;left:12px;display:flex;gap:6px;flex-wrap:wrap;}
  .card-badge{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;backdrop-filter:blur(8px);}
  .badge-active{background:rgba(16,185,129,.15);color:#059669;border:1px solid rgba(16,185,129,.2);}
  .badge-draft{background:rgba(245,158,11,.15);color:#D97706;border:1px solid rgba(245,158,11,.2);}
  .badge-archived{background:rgba(100,116,139,.15);color:#475569;border:1px solid rgba(100,116,139,.2);}
  .badge-country{background:rgba(6,182,212,.12);color:#0891B2;border:1px solid rgba(6,182,212,.15);}
  .card-type{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(139,92,246,.12);color:var(--primary-dark);border:1px solid rgba(139,92,246,.15);backdrop-filter:blur(8px);}
  .product-card-body{padding:20px 24px 8px;}
  .product-name{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px;}
  .product-brand{font-size:13px;color:var(--primary);font-weight:600;margin-bottom:10px;}
  .product-desc{font-size:13px;color:var(--text-light);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .product-card-footer{padding:14px 24px 18px;display:flex;justify-content:space-between;align-items:center;}
  .product-tags{display:flex;gap:6px;flex-wrap:wrap;}
  .mini-tag{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg);color:var(--text-muted);}
  .card-actions{display:flex;gap:2px;}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);z-index:200;justify-content:center;align-items:flex-start;padding:24px 20px;overflow-y:auto;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:780px;box-shadow:0 25px 60px rgba(0,0,0,.25);animation:modalIn .3s ease;border:1px solid var(--border);}
  @keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
  .modal-header{padding:24px 32px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .modal-header h3{font-size:20px;font-weight:800;}
  .modal-close{width:36px;height:36px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-light);transition:all .2s;}
  .modal-close:hover{background:var(--danger);color:#fff;border-color:var(--danger);}
  .modal-body{padding:32px;max-height:70vh;overflow-y:auto;}
  .modal-footer{padding:20px 32px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

  .load-existing-bar{display:flex;gap:10px;align-items:center;padding:16px;background:var(--primary-bg);border-radius:var(--radius-sm);margin-bottom:28px;flex-wrap:wrap;}
  .load-existing-bar label{font-size:13px;font-weight:600;color:var(--primary-dark);white-space:nowrap;}
  .load-existing-bar select{flex:1;min-width:200px;padding:8px 12px;border:1.5px solid var(--primary-light);border-radius:var(--radius-xs);font-size:13px;font-family:inherit;outline:none;background:var(--card);}

  .form-section{margin-bottom:32px;padding-bottom:28px;border-bottom:1px solid var(--border);}
  .form-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .form-section-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:20px;}
  .badge-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--primary-bg);}
  .form-group{margin-bottom:18px;}.form-group:last-child{margin-bottom:0;}
  .form-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;margin-bottom:7px;}
  .form-label .req{color:var(--accent);font-size:11px;}
  .form-hint{font-size:11px;color:var(--text-muted);font-weight:400;}
  .form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13.5px;font-family:inherit;color:var(--text);background:var(--card);transition:border-color .2s,box-shadow .2s;outline:none;}
  .form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(139,92,246,.08);}
  .form-textarea{resize:vertical;min-height:80px;line-height:1.8;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .form-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}

  .img-upload-area{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);position:relative;}
  .img-upload-area:hover,.img-upload-area.dragover{border-color:var(--primary);background:var(--primary-bg);}
  .img-upload-area.dragover{box-shadow:0 0 0 4px rgba(139,92,246,.12);}
  .img-upload-area .icon{font-size:32px;margin-bottom:8px;display:block;}
  .img-upload-area .text{font-size:13px;color:var(--text-light);}
  .img-upload-area .hint{font-size:11px;color:var(--text-muted);margin-top:4px;}
  .img-preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:12px;}
  .img-preview-item{position:relative;border-radius:var(--radius-xs);overflow:hidden;aspect-ratio:1;background:var(--bg);border:1px solid var(--border);}
  .img-preview-item img{width:100%;height:100%;object-fit:cover;}
  .img-preview-item .remove-img{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .img-preview-item .img-label{position:absolute;bottom:0;left:0;right:0;padding:3px 6px;background:rgba(0,0,0,.5);color:#fff;font-size:10px;font-weight:600;text-align:center;}

  .detail-back{display:inline-flex;align-items:center;gap:8px;color:var(--text-light);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:24px;padding:6px 12px;border-radius:var(--radius-xs);transition:all .2s;}
  .detail-back:hover{color:var(--primary);background:var(--primary-bg);}
  .detail-hero{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;margin-bottom:24px;}
  .detail-hero-banner{height:200px;background:linear-gradient(135deg,#EDE9FE 0%,#FCE7F3 50%,#E0F2FE 100%);position:relative;overflow:hidden;}
  .detail-hero-banner img{width:100%;height:100%;object-fit:cover;}
  .detail-hero-body{padding:32px 36px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;}
  .detail-hero h2{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px;}
  .detail-hero .brand-name{font-size:14px;color:var(--primary);font-weight:600;}
  .detail-meta{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;}
  .detail-meta-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-light);background:var(--bg);padding:6px 12px;border-radius:var(--radius-xs);}
  .detail-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
  .detail-section{background:var(--card);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);border:1px solid var(--border);}
  .detail-section.full{grid-column:1/-1;}
  .section-header{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .section-icon{width:32px;height:32px;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .section-content{font-size:14px;color:var(--text-light);line-height:2;white-space:pre-wrap;}
  .selling-point-item{padding:14px 16px;background:var(--bg);border-radius:var(--radius-xs);margin-bottom:10px;border-left:3px solid var(--primary);}
  .selling-point-item strong{display:block;font-size:13px;font-weight:700;color:var(--primary-dark);margin-bottom:4px;}
  .selling-point-item span{font-size:13px;color:var(--text-light);line-height:1.7;}
  .tag-grid{display:flex;gap:8px;flex-wrap:wrap;}
  .guide-tag{padding:6px 14px;border-radius:var(--radius-xs);font-size:12px;font-weight:600;line-height:1.5;}
  .tag-do{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0;}
  .tag-dont{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;}
  .tag-hashtag{background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;}
  .tag-mention{background:#F5F3FF;color:#7C3AED;border:1px solid #DDD6FE;}
  .tag-caution{background:#FFFBEB;color:#D97706;border:1px solid #FDE68A;}
  .content-flow-list{counter-reset:flow;}
  .flow-step{display:flex;gap:16px;align-items:flex-start;padding:16px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:10px;}
  .flow-step::before{counter-increment:flow;content:'#' counter(flow);flex-shrink:0;width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .flow-step-content{flex:1;}
  .flow-step-content strong{display:block;font-size:14px;font-weight:700;margin-bottom:4px;}
  .flow-step-content p{font-size:13px;color:var(--text-light);line-height:1.7;}
  .visual-guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
  .visual-item{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);background:var(--bg);}
  .visual-item img{width:100%;aspect-ratio:1;object-fit:cover;}
  .visual-item .label{padding:8px 12px;font-size:12px;font-weight:600;color:var(--text-light);text-align:center;}

  .empty-state{text-align:center;padding:80px 20px;}
  .empty-state .icon{font-size:56px;margin-bottom:16px;}
  .empty-state h3{font-size:18px;margin-bottom:8px;}
  .empty-state p{color:var(--text-muted);font-size:14px;margin-bottom:24px;}

  .toast-container{position:fixed;bottom:28px;right:28px;z-index:300;display:flex;flex-direction:column;gap:8px;}
  .toast{padding:14px 22px;border-radius:var(--radius-sm);background:var(--text);color:#fff;font-size:13.5px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.2);animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;display:flex;align-items:center;gap:8px;}
  @keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
  @keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateY(-8px);}}

  .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:250;justify-content:center;align-items:center;}
  .confirm-overlay.show{display:flex;}
  .confirm-box{background:var(--card);border-radius:var(--radius);padding:36px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .confirm-box .c-icon{font-size:40px;margin-bottom:16px;}
  .confirm-box h4{font-size:18px;margin-bottom:8px;}
  .confirm-box p{color:var(--text-light);font-size:14px;margin-bottom:24px;}
  .confirm-actions{display:flex;gap:10px;justify-content:center;}

  .share-link-box{display:flex;gap:8px;align-items:center;padding:14px;background:var(--bg);border-radius:var(--radius-sm);border:1.5px solid var(--border);margin-top:12px;}
  .share-link-box input{flex:1;border:none;background:transparent;font-size:13px;font-family:'Courier New',monospace;color:var(--text);outline:none;}

  .mobile-toggle{display:none;position:fixed;top:14px;left:14px;z-index:150;width:44px;height:44px;border-radius:var(--radius-sm);background:var(--card);border:1.5px solid var(--border);cursor:pointer;font-size:20px;align-items:center;justify-content:center;box-shadow:var(--shadow);}
  @media(max-width:960px){
    .mobile-toggle{display:flex;}.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}
    .main{margin-left:0;padding:24px 16px;padding-top:72px;}
    .stats-grid{grid-template-columns:repeat(2,1fr);}.product-grid{grid-template-columns:1fr;}
    .detail-grid{grid-template-columns:1fr;}.form-row,.form-row-3,.form-row-4{grid-template-columns:1fr;}
  }
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#E2E8F0;border-radius:3px;}

  /* Storyboard - Content Flow with images */
  .storyboard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:12px;}
  .storyboard-card{border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg);transition:all .2s;}
  .storyboard-card:hover{border-color:var(--primary-light);box-shadow:0 4px 16px rgba(139,92,246,.08);}
  .storyboard-card .sb-img{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#EDE9FE,#FCE7F3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;}
  .storyboard-card .sb-img img{width:100%;height:100%;object-fit:cover;}
  .storyboard-card .sb-img .sb-placeholder{font-size:28px;opacity:.4;}
  .storyboard-card .sb-img .sb-remove{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:2;}
  .storyboard-card .sb-body{padding:12px 14px;}
  .storyboard-card .sb-step{font-size:11px;font-weight:800;color:var(--primary);margin-bottom:4px;}
  .storyboard-card .sb-title-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;font-family:inherit;margin-bottom:6px;outline:none;transition:border-color .2s;}
  .storyboard-card .sb-title-input:focus{border-color:var(--primary-light);}
  .storyboard-card .sb-desc-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;font-family:inherit;resize:vertical;min-height:48px;outline:none;line-height:1.6;transition:border-color .2s;}
  .storyboard-card .sb-desc-input:focus{border-color:var(--primary-light);}
  .storyboard-add{border:2px dashed var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;min-height:160px;cursor:pointer;transition:all .2s;flex-direction:column;gap:8px;color:var(--text-muted);font-size:13px;font-weight:600;}
  .storyboard-add:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-bg);}
  .storyboard-add .plus-icon{font-size:28px;}

  /* Detail storyboard view */
  .storyboard-view-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
  .storyboard-view-card{border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg);transition:all .2s;}
  .storyboard-view-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.06);}
  .storyboard-view-card .sv-img{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#EDE9FE,#FCE7F3);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .storyboard-view-card .sv-img img{width:100%;height:100%;object-fit:cover;}
  .storyboard-view-card .sv-body{padding:14px 16px;}
  .storyboard-view-card .sv-step{display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--primary),var(--accent));padding:3px 10px;border-radius:6px;margin-bottom:8px;}
  .storyboard-view-card .sv-title{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text);}
  .storyboard-view-card .sv-desc{font-size:13px;color:var(--text-light);line-height:1.7;}

  /* Required Angles */
  .angle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:12px;}
  .angle-card{border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg);transition:all .2s;}
  .angle-card:hover{border-color:var(--primary-light);}
  .angle-card .angle-img{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#FEF3C7,#FCE7F3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;}
  .angle-card .angle-img img{width:100%;height:100%;object-fit:cover;}
  .angle-card .angle-img .angle-placeholder{font-size:32px;opacity:.4;}
  .angle-card .angle-img .angle-remove{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:2;}
  .angle-card .angle-body{padding:12px 14px;}
  .angle-card .angle-title-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;font-family:inherit;margin-bottom:6px;outline:none;}
  .angle-card .angle-title-input:focus{border-color:var(--primary-light);}
  .angle-card .angle-desc-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;font-family:inherit;resize:vertical;min-height:48px;outline:none;line-height:1.6;}
  .angle-card .angle-desc-input:focus{border-color:var(--primary-light);}
  .angle-add{border:2px dashed var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;min-height:180px;cursor:pointer;transition:all .2s;flex-direction:column;gap:8px;color:var(--text-muted);font-size:13px;font-weight:600;}
  .angle-add:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-bg);}

  /* Angle view in detail */
  .angle-view-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
  .angle-view-card{border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg);transition:all .2s;}
  .angle-view-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.06);}
  .angle-view-card .av-img{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#FEF3C7,#FCE7F3);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .angle-view-card .av-img img{width:100%;height:100%;object-fit:cover;}
  .angle-view-card .av-body{padding:12px 14px;}
  .angle-view-card .av-title{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text);}
  .angle-view-card .av-desc{font-size:13px;color:var(--text-light);line-height:1.7;}

  /* Do's & Don'ts with images */
  .dosdont-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:8px;}
  .dosdont-card{border-radius:var(--radius-sm);overflow:hidden;transition:all .2s;}
  .dosdont-card.do-card{border:1.5px solid #A7F3D0;background:#ECFDF5;}
  .dosdont-card.dont-card{border:1.5px solid #FECACA;background:#FEF2F2;}
  .dosdont-card .dd-img{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;}
  .dosdont-card.do-card .dd-img{background:linear-gradient(135deg,#D1FAE5,#A7F3D0);}
  .dosdont-card.dont-card .dd-img{background:linear-gradient(135deg,#FEE2E2,#FECACA);}
  .dosdont-card .dd-img img{width:100%;height:100%;object-fit:cover;}
  .dosdont-card .dd-img .dd-placeholder{font-size:28px;opacity:.4;}
  .dosdont-card .dd-img .dd-remove{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:2;}
  .dosdont-card .dd-body{padding:10px 12px;}
  .dosdont-card .dd-text-input{width:100%;border:1px solid rgba(0,0,0,.1);border-radius:6px;padding:6px 10px;font-size:12px;font-family:inherit;resize:vertical;min-height:40px;outline:none;line-height:1.6;background:rgba(255,255,255,.6);}
  .dosdont-card .dd-text-input:focus{border-color:var(--primary-light);}
  .dosdont-card .dd-remove-card{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:2;}

  /* Detail do/dont with images */
  .dosdont-view-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
  .dosdont-view-card{border-radius:var(--radius-sm);overflow:hidden;}
  .dosdont-view-card.do-view{border:1.5px solid #A7F3D0;background:#ECFDF5;}
  .dosdont-view-card.dont-view{border:1.5px solid #FECACA;background:#FEF2F2;}
  .dosdont-view-card .dv-img{width:100%;aspect-ratio:4/3;overflow:hidden;}
  .dosdont-view-card .dv-img img{width:100%;height:100%;object-fit:cover;}
  .dosdont-view-card .dv-body{padding:10px 14px;font-size:13px;line-height:1.7;}
  .dosdont-view-card.do-view .dv-body{color:#059669;}
  .dosdont-view-card.dont-view .dv-body{color:#DC2626;}

</style>
</head>

function buildSelects(){

  // Status

  stSel.innerHTML=`<option value="active">${t('opt.status.active')}</option><option value="draft">${t('opt.status.draft')}</option>`;

  // Country
  const coSel=document.getElementById('f-country');

  coSel.innerHTML=['KR','US','JP','CN','TH','VN','EU','GLOBAL'].map(c=>`<option value="${c}">${t('opt.country.'+c)}</option>`).join('');
  coSel.value=coVal;
}

function buildCatFilter(){
  const row=document.getElementById('catFilterRow');
  const cats=[{k:'all'},{k:'ampoule',e:'💧'},{k:'cream',e:'🧴'},{k:'pad',e:'🧻'},{k:'toner',e:'💦'},{k:'mask',e:'🎭'},{k:'etc',e:'📌'}];
  row.innerHTML=`<span class="filter-label">${t('filter.category')}</span>`+cats.map(c=>`<div class="pill ${filterCat===c.k?'active':''}" onclick="setFilter('cat','${c.k}',this)">${c.e||''} ${t('cat.'+c.k)}</div>`).join('');
}

function buildCountryFilter(){
  const countries=[...new Set(products.filter(p=>p.status!=='archived').map(p=>p.country||'KR'))];
  const row=document.getElementById('countryFilterRow');
  row.innerHTML=`<span class="filter-label">${t('filter.country')}</span><div class="pill pill-country ${filterCountry==='all'?'active':''}" onclick="setFilter('country','all',this)">${t('country.all')}</div>`+
    countries.map(c=>`<div class="pill pill-country ${filterCountry===c?'active':''}" onclick="setFilter('country','${c}',this)">${countryFlags[c]||''} ${c}</div>`).join('');
}

function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(i18n[lang][k])el.textContent=i18n[lang][k];});
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{const k=el.getAttribute('data-i18n-placeholder');if(i18n[lang][k])el.placeholder=i18n[lang][k];});
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===lang));
  document.documentElement.lang=lang==='ko'?'ko':'en';
  buildSelects();
  buildCatFilter();
  buildCountryFilter();
}

// ==================== DRAG & DROP ====================
function setupDragDrop(areaId,isMultiple){
  const area=document.getElementById(areaId);
  if(!area)return;
  ['dragenter','dragover'].forEach(ev=>area.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();area.classList.add('dragover');}));
  ['dragleave','drop'].forEach(ev=>area.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();area.classList.remove('dragover');}));
  area.addEventListener('drop',async e=>{
    const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
    if(!files.length)return;
    if(isMultiple){
      for(const f of files) tempRefImgs.push(await fileToB64(f));
      renderRefPreviews();
    } else {
      tempMainImg=await fileToB64(files[0]);
      document.getElementById('mainImgPreview').innerHTML=`<div class="img-preview-item"><img src="${tempMainImg}"><button class="remove-img" onclick="tempMainImg=null;this.parentElement.remove()">✕</button><div class="img-label">${t('form.mainImg')}</div></div>`;
    }
  });
}

// ==================== IMAGE ====================
function fileToB64(f){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(f);});}
async function handleMainImg(e){
  const f=e.target.files[0];if(!f)return;
  tempMainImg=await fileToB64(f);
  document.getElementById('mainImgPreview').innerHTML=`<div class="img-preview-item"><img src="${tempMainImg}"><button class="remove-img" onclick="tempMainImg=null;this.parentElement.remove()">✕</button><div class="img-label">${t('form.mainImg')}</div></div>`;
}
async function handleRefImgs(e){for(const f of Array.from(e.target.files))tempRefImgs.push(await fileToB64(f));renderRefPreviews();}
function renderRefPreviews(){
  document.getElementById('refImgsPreview').innerHTML=tempRefImgs.map((img,i)=>`<div class="img-preview-item"><img src="${img}"><button class="remove-img" onclick="tempRefImgs.splice(${i},1);renderRefPreviews()">✕</button><div class="img-label">#${i+1}</div></div>`).join('');
}

function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const tgt=document.getElementById('page-'+page);if(tgt)tgt.style.display='block';
  const nav=document.querySelector(`.nav-item[data-page="${page}"]`);if(nav)nav.classList.add('active');
  document.querySelector('.sidebar').classList.remove('open');
  if(page==='dashboard')renderDashboard();
  if(page==='products'){renderProducts();buildCatFilter();buildCountryFilter();}
  if(page==='archive')renderArchive();
}

function updateStats(){
  const all=products.length,act=products.filter(p=>p.status==='active').length,
    dft=products.filter(p=>p.status==='draft').length,arc=products.filter(p=>p.status==='archived').length;
  document.getElementById('s-total').textContent=all;document.getElementById('s-active').textContent=act;
  document.getElementById('s-draft').textContent=dft;document.getElementById('s-archived').textContent=arc;
  document.getElementById('navPC').textContent=all-arc;document.getElementById('navAC').textContent=arc;
}

function setFilter(type,val,el){
  if(type==='cat'){filterCat=val;el.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');}
  else{filterCountry=val;el.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');}
  renderProducts();
}

// ==================== CARD ====================
function makeCard(p,mode){
  const catE=catEmojis[p.category]||'📌';
  const stClass=p.status==='active'?'badge-active':p.status==='draft'?'badge-draft':'badge-archived';
  const stLabel=t('status.'+p.status);
  const dateFmt=lang==='ko'?'ko-KR':'en-US';
  const date=new Date(p.createdAt).toLocaleDateString(dateFmt,{year:'numeric',month:'short',day:'numeric'});
  const flag=countryFlags[p.country]||'🌏';
  const thumb=p.mainImage?`<img src="${p.mainImage}">`:`<div class="product-thumb-placeholder">${catE}</div>`;
  let actionBtns='';
  if(mode==='archive'){
    actionBtns=`<button class="btn btn-xs btn-success" onclick="event.stopPropagation();restoreProduct('${p.id}')">${t('btn.restore')}</button><button class="btn btn-xs btn-danger" onclick="event.stopPropagation();confirmDelete('${p.id}')">${t('btn.delete')}</button>`;
  } else {
    actionBtns=`<button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();openEditModal('${p.id}')" title="${t('btn.edit')}">✏️</button><button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();archiveProduct('${p.id}')" title="${t('btn.archive')}">🗄️</button><button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();confirmDelete('${p.id}')" title="${t('btn.delete')}" style="color:var(--danger)">🗑️</button>`;
  }
  return `<div class="product-card" onclick="viewDetail('${p.id}')"><div class="product-thumb">${thumb}<div class="card-badges"><span class="card-badge ${stClass}">${stLabel}</span><span class="card-badge badge-country">${flag} ${p.country||'KR'}</span></div><span class="card-type">${catE} ${t('cat.'+(p.category||'cream'))}</span></div><div class="product-card-body"><div class="product-name">${esc(p.name)}</div><div class="product-brand">${esc(p.brand)}</div><div class="product-desc">${esc(p.positioning||p.sellingPoints||'')}</div></div><div class="product-card-footer"><div class="product-tags"><span class="mini-tag">📅 ${date}</span>${p.priceInfo?`<span class="mini-tag">💰 ${esc(p.priceInfo).substring(0,25)}</span>`:''}</div><div class="card-actions" onclick="event.stopPropagation()">${actionBtns}</div></div></div>`;
}

function emptyH(icon,tk,dk,btn){return `<div class="empty-state" style="grid-column:1/-1"><div class="icon">${icon}</div><h3>${t(tk)}</h3><p>${t(dk)}</p>${btn||''}</div>`;}

function renderDashboard(){
  updateStats();
  const recent=[...products].filter(p=>p.status!=='archived').sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);
  document.getElementById('recentProducts').innerHTML=recent.length?recent.map(p=>makeCard(p,'normal')).join(''):emptyH('💄','empty.noGuide','empty.noGuideDesc',`<button class="btn btn-primary" onclick="loadSampleData()">✨ ${t('nav.sample')}</button>`);
}

function renderProducts(){
  updateStats();
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  let list=products.filter(p=>p.status!=='archived');
  if(filterCat!=='all')list=list.filter(p=>p.category===filterCat);
  if(filterCountry!=='all')list=list.filter(p=>(p.country||'KR')===filterCountry);
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q));
  list.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  document.getElementById('productList').innerHTML=list.length?list.map(p=>makeCard(p,'normal')).join(''):emptyH('🔍','empty.noResult','empty.noResultDesc');
}

function renderArchive(){
  const q=(document.getElementById('archiveSearch')?.value||'').toLowerCase();
  let list=products.filter(p=>p.status==='archived');
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q));
  list.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  document.getElementById('archiveList').innerHTML=list.length?list.map(p=>makeCard(p,'archive')).join(''):emptyH('🗄️','empty.noArchive','empty.noArchiveDesc');
}

// ==================== DETAIL ====================
function viewDetail(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  const catE=catEmojis[p.category]||'📌';
  const stClass=p.status==='active'?'badge-active':p.status==='draft'?'badge-draft':'badge-archived';
  const flag=countryFlags[p.country]||'🌏';
  const notW=`<span style="color:var(--text-muted)">${t('detail.notWritten')}</span>`;
  document.querySelectorAll('.page').forEach(pg=>pg.style.display='none');
  const detail=document.getElementById('page-detail');detail.style.display='block';

  const spL=(p.sellingPoints||'').split('\n').filter(Boolean);
  const spH=spL.length?spL.map((s,i)=>`<div class="selling-point-item"><strong>Point ${i+1}</strong><span>${esc(s.replace(/^[•\-]\s*/,''))}</span></div>`).join(''):notW;
  // Storyboard rendering
  const sbData=p.storyboard||[];
  let flH='';
  if(sbData.length){
    flH='<div class="storyboard-view-grid">'+sbData.map((s,i)=>`<div class="storyboard-view-card"><div class="sv-img">${s.image?`<img src="${s.image}">`:`<div style="font-size:40px;opacity:.3">🎬</div>`}</div><div class="sv-body"><div class="sv-step">SCENE ${i+1}</div>${s.title?`<div class="sv-title">${esc(s.title)}</div>`:''}<div class="sv-desc">${esc(s.desc)}</div></div></div>`).join('')+'</div>';
  } else {
    // backward compat with old text format
    const flL=(p.contentFlow||'').split('\n').filter(Boolean);
    flH=flL.length?'<div class="content-flow-list">'+flL.map(fl=>{const m=fl.match(/^\[(.+?)\]\s*(.+)/);return m?`<div class="flow-step"><div class="flow-step-content"><strong>${esc(m[1])}</strong><p>${esc(m[2])}</p></div></div>`:`<div class="flow-step"><div class="flow-step-content"><p>${esc(fl.replace(/^[•\-]\s*/,''))}</p></div></div>`;}).join('')+'</div>':notW;
  }
  // Do's & Don'ts with images
  const dosData=p.dosItems||[];
  const dontsData=p.dontItems||[];
  let doH='', dnH='';
  if(dosData.length){
    doH='<div class="dosdont-view-grid">'+dosData.map(d=>`<div class="dosdont-view-card do-view">${d.image?`<div class="dv-img"><img src="${d.image}"></div>`:''}<div class="dv-body">✅ ${esc(d.text)}</div></div>`).join('')+'</div>';
  } else {
    doH=(p.dos||'').split('\n').filter(Boolean).map(d=>`<span class="guide-tag tag-do">✅ ${esc(d.replace(/^[•\-]\s*/,''))}</span>`).join('')||notW;
  }
  if(dontsData.length){
    dnH='<div class="dosdont-view-grid">'+dontsData.map(d=>`<div class="dosdont-view-card dont-view">${d.image?`<div class="dv-img"><img src="${d.image}"></div>`:''}<div class="dv-body">❌ ${esc(d.text)}</div></div>`).join('')+'</div>';
  } else {
    dnH=(p.donts||'').split('\n').filter(Boolean).map(d=>`<span class="guide-tag tag-dont">❌ ${esc(d.replace(/^[•\-]\s*/,''))}</span>`).join('')||notW;
  }
  const haH=(p.hashtags||'').split(/\s+/).filter(h=>h.startsWith('#')).map(h=>`<span class="guide-tag tag-hashtag">${esc(h)}</span>`).join('');
  const caH=(p.cautions||'').split('\n').filter(Boolean).map(c=>`<span class="guide-tag tag-caution">⚠️ ${esc(c.replace(/^[•\-]\s*/,''))}</span>`).join('');
  // Required Angles rendering
  const angData=p.angles||[];
  const angH=angData.length?'<div class="angle-view-grid">'+angData.map((a,i)=>`<div class="angle-view-card"><div class="av-img">${a.image?`<img src="${a.image}">`:`<div style="font-size:40px;opacity:.3">📐</div>`}</div><div class="av-body">${a.title?`<div class="av-title">${esc(a.title)}</div>`:''}<div class="av-desc">${esc(a.desc)}</div></div></div>`).join('')+'</div>':'';
  const banner=p.mainImage?`<img src="${p.mainImage}">`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px;opacity:.4">${catE}</div>`;
  const dateFmt=lang==='ko'?'ko-KR':'en-US';
  const dateStr=p.startDate?`${p.startDate} ~ ${p.endDate||''}`:'';

  detail.innerHTML=`
    <div class="viewer-watermark">${t('viewer.badge')}</div>
    <div class="detail-back" onclick="showPage('${p.status==='archived'?'archive':'products'}')">${t('detail.back')}</div>
    <div class="detail-hero"><div class="detail-hero-banner">${banner}</div>
      <div class="detail-hero-body"><div>
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
          <span class="card-badge ${stClass}" style="position:static">${t('status.'+p.status)}</span>
          <span class="card-badge badge-country" style="position:static">${flag} ${p.country||'KR'}</span>
          <span class="card-badge" style="position:static;background:rgba(139,92,246,.1);color:var(--primary-dark);border:1px solid rgba(139,92,246,.15)">${catE} ${t('cat.'+(p.category||'cream'))}</span>
          ${p.productType?`<span class="card-badge" style="position:static;background:rgba(6,182,212,.1);color:#0891B2;border:1px solid rgba(6,182,212,.15)">${esc(p.productType)}</span>`:''}
        </div>
        <h2>${esc(p.name)}</h2><div class="brand-name">${esc(p.brand)}</div>
        <div class="detail-meta">
          ${p.priceInfo?`<span class="detail-meta-item">💰 ${esc(p.priceInfo)}</span>`:''}
          ${p.salesChannel?`<span class="detail-meta-item">🏪 ${esc(p.salesChannel)}</span>`:''}
          ${dateStr?`<span class="detail-meta-item">📅 ${dateStr}</span>`:''}
        </div></div>
        <div class="detail-actions">
          <button class="btn btn-sm btn-outline btn-edit-only" onclick="openEditModal('${p.id}')">✏️ ${t('btn.edit')}</button>
          <button class="btn btn-sm btn-outline" onclick="copyGuideText('${p.id}')">📋 ${t('btn.copyText')}</button>
          <button class="btn btn-sm btn-accent btn-edit-only" onclick="openShareModal('${p.id}')">🔗 ${t('btn.shareLink')}</button>
        </div>
      </div>
    </div>
    <div class="detail-grid">
      ${p.positioning?`<div class="detail-section full"><div class="section-header"><div class="section-icon" style="background:#F5F3FF">✨</div>${t('detail.positioning')}</div><div class="section-content">${esc(p.positioning)}</div></div>`:''}
      <div class="detail-section full"><div class="section-header"><div class="section-icon" style="background:#FEF3C7">⭐</div>${t('detail.sellingPoints')}</div>${spH}</div>
      <div class="detail-section"><div class="section-header"><div class="section-icon" style="background:#ECFDF5">🧪</div>${t('detail.ingredients')}</div><div class="section-content">${p.ingredients?esc(p.ingredients):notW}</div></div>
      <div class="detail-section"><div class="section-header"><div class="section-icon" style="background:#FDF2F8">🤲</div>${t('detail.howToUse')}</div><div class="section-content">${p.howToUse?esc(p.howToUse):notW}</div></div>
      <div class="detail-section full"><div class="section-header"><div class="section-icon" style="background:#EDE9FE">🎬</div>${t('detail.contentFlow')}</div>${flH}</div>
      <div class="detail-section full"><div class="section-header"><div class="section-icon" style="background:#FEF3C7">📐</div>${t('detail.angles')}</div>${angH||notW}</div>
      <div class="detail-section"><div class="section-header"><div class="section-icon" style="background:#EFF6FF">📢</div>${t('detail.tags')}</div>
        ${p.brandTag?`<div style="margin-bottom:12px"><span class="guide-tag tag-mention">${esc(p.brandTag)}</span></div>`:''}
        ${haH?`<div class="tag-grid" style="margin-bottom:12px">${haH}</div>`:''}
        ${p.keyMention?`<div style="padding:12px 16px;background:var(--primary-bg);border-radius:var(--radius-xs);border-left:3px solid var(--primary);font-size:14px;font-weight:600;color:var(--primary-dark);line-height:1.8">"${esc(p.keyMention)}"</div>`:''}
        ${!p.brandTag&&!haH&&!p.keyMention?notW:''}
      </div>
      <div class="detail-section"><div class="section-header"><div class="section-icon" style="background:#ECFDF5">✅</div>${t('detail.dosdonts')}</div>
        <div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:var(--success);margin-bottom:8px">${t('detail.doLabel')}</div><div class="tag-grid">${doH}</div></div>
        <div><div style="font-size:12px;font-weight:700;color:var(--danger);margin-bottom:8px">${t('detail.dontLabel')}</div><div class="tag-grid">${dnH}</div></div>
        ${caH?`<div style="margin-top:14px"><div style="font-size:12px;font-weight:700;color:var(--warning);margin-bottom:8px">${t('detail.cautionLabel')}</div><div class="tag-grid">${caH}</div></div>`:''}
      </div>
      ${p.reference?`<div class="detail-section full"><div class="section-header"><div class="section-icon" style="background:#F1F5F9">🔗</div>${t('detail.reference')}</div><div class="section-content">${esc(p.reference)}</div></div>`:''}
    </div>`;
}

// ==================== MODAL ====================
const fFields=['f-name','f-brand','f-productType','f-priceInfo','f-salesChannel','f-startDate','f-endDate','f-positioning','f-sellingPoints','f-ingredients','f-howToUse','f-brandTag','f-hashtags','f-keyMention','f-cautions','f-reference'];
const dKeys=['name','brand','productType','priceInfo','salesChannel','startDate','endDate','positioning','sellingPoints','ingredients','howToUse','brandTag','hashtags','keyMention','cautions','reference'];

function populateLoadSelect(){
  document.getElementById('loadExistingSelect').innerHTML=`<option value="">${t('modal.selectGuide')}</option>`+products.map(p=>`<option value="${p.id}">${esc(p.name)} (${esc(p.brand)}) [${countryFlags[p.country]||''}${p.country||'KR'}]</option>`).join('');
}

function loadExisting(){
  const id=document.getElementById('loadExistingSelect').value;
  if(!id){toast(t('toast.selectFirst'));return;}
  const p=products.find(x=>x.id===id);if(!p)return;
  dKeys.forEach((k,i)=>{const el=document.getElementById(fFields[i]);if(el)el.value=p[k]||'';});
  document.getElementById('f-category').value=p.category||'cream';
  document.getElementById('f-country').value=p.country||'KR';
  document.getElementById('f-status').value='draft';
  tempMainImg=p.mainImage||null;tempRefImgs=[...(p.refImages||[])];
  tempStoryboard=[...(p.storyboard||[]).map(s=>({...s}))];
  tempAngles=[...(p.angles||[]).map(a=>({...a}))];
  tempDos=[...(p.dosItems||[]).map(d=>({...d}))];
  tempDonts=[...(p.dontItems||[]).map(d=>({...d}))];
  if(tempDos.length===0 && p.dos){p.dos.split('\n').filter(Boolean).forEach(line=>tempDos.push({image:null,text:line.replace(/^[•\-]\s*/,'')}));}
  if(tempDonts.length===0 && p.donts){p.donts.split('\n').filter(Boolean).forEach(line=>tempDonts.push({image:null,text:line.replace(/^[•\-]\s*/,'')}));}
  if(tempStoryboard.length===0 && p.contentFlow){p.contentFlow.split('\n').filter(Boolean).forEach(line=>{const m=line.match(/^\[(.+?)\]\s*(.+)/);tempStoryboard.push({image:null,title:m?m[1]:'',desc:m?m[2]:line.replace(/^[•\-]\s*/,'')});});}
  const mp=document.getElementById('mainImgPreview');
  mp.innerHTML=tempMainImg?`<div class="img-preview-item"><img src="${tempMainImg}"><button class="remove-img" onclick="tempMainImg=null;this.parentElement.remove()">✕</button></div>`:'';
  renderRefPreviews();renderStoryboard();renderAngles();renderDoDontItems('dos');renderDoDontItems('donts');toast(t('toast.loaded'));
}

function openAddModal(){
  document.getElementById('modalTitle').textContent=t('modal.newTitle');
  document.getElementById('editId').value='';
  document.getElementById('loadExistingBar').style.display='flex';
  fFields.forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('f-category').value='cream';
  document.getElementById('f-status').value='active';
  document.getElementById('f-country').value='KR';
  tempMainImg=null;tempRefImgs=[];tempStoryboard=[];tempAngles=[];tempDos=[];tempDonts=[];
  document.getElementById('mainImgPreview').innerHTML='';
  document.getElementById('refImgsPreview').innerHTML='';
  renderStoryboard();renderAngles();renderDoDontItems('dos');renderDoDontItems('donts');
  populateLoadSelect();buildSelects();
  document.getElementById('productModal').classList.add('show');
  // Re-setup drag drop after modal opens
  setTimeout(()=>{setupDragDrop('mainImgDrop',false);setupDragDrop('refImgDrop',true);},100);
}

function openEditModal(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  document.getElementById('modalTitle').textContent=t('modal.editTitle');
  document.getElementById('editId').value=id;
  document.getElementById('loadExistingBar').style.display='none';
  dKeys.forEach((k,i)=>{const el=document.getElementById(fFields[i]);if(el)el.value=p[k]||'';});
  buildSelects();
  document.getElementById('f-category').value=p.category||'cream';
  document.getElementById('f-status').value=p.status==='archived'?'active':p.status;
  document.getElementById('f-country').value=p.country||'KR';
  tempMainImg=p.mainImage||null;tempRefImgs=[...(p.refImages||[])];
  tempStoryboard=[...(p.storyboard||[]).map(s=>({...s}))];
  tempAngles=[...(p.angles||[]).map(a=>({...a}))];
  tempDos=[...(p.dosItems||[]).map(d=>({...d}))];
  tempDonts=[...(p.dontItems||[]).map(d=>({...d}))];
  // backward compat: if dos/donts were text, convert
  if(tempDos.length===0 && p.dos){p.dos.split('\n').filter(Boolean).forEach(line=>tempDos.push({image:null,text:line.replace(/^[•\-]\s*/,'')}));}
  if(tempDonts.length===0 && p.donts){p.donts.split('\n').filter(Boolean).forEach(line=>tempDonts.push({image:null,text:line.replace(/^[•\-]\s*/,'')}));}
  // backward compat: if contentFlow was text, convert
  if(tempStoryboard.length===0 && p.contentFlow){p.contentFlow.split('\n').filter(Boolean).forEach(line=>{const m=line.match(/^\[(.+?)\]\s*(.+)/);tempStoryboard.push({image:null,title:m?m[1]:'' ,desc:m?m[2]:line.replace(/^[•\-]\s*/,'')});});}
  const mp=document.getElementById('mainImgPreview');
  mp.innerHTML=tempMainImg?`<div class="img-preview-item"><img src="${tempMainImg}"><button class="remove-img" onclick="tempMainImg=null;this.parentElement.remove()">✕</button></div>`:'';
  renderRefPreviews();renderStoryboard();renderAngles();renderDoDontItems('dos');renderDoDontItems('donts');
  document.getElementById('productModal').classList.add('show');
  setTimeout(()=>{setupDragDrop('mainImgDrop',false);setupDragDrop('refImgDrop',true);},100);
}

function closeModal(){document.getElementById('productModal').classList.remove('show');}

function saveProduct(){
  const name=document.getElementById('f-name').value.trim(),brand=document.getElementById('f-brand').value.trim();
  if(!name||!brand){toast(t('toast.inputRequired'));return;}
  const data={};dKeys.forEach((k,i)=>{data[k]=document.getElementById(fFields[i]).value.trim();});
  data.category=document.getElementById('f-category').value;
  data.status=document.getElementById('f-status').value;
  data.country=document.getElementById('f-country').value;
  data.mainImage=tempMainImg;data.refImages=[...tempRefImgs];
  data.storyboard=[...tempStoryboard];
  data.angles=[...tempAngles];
  data.dosItems=[...tempDos];
  data.dontItems=[...tempDonts];
  const editId=document.getElementById('editId').value;
  if(editId){const idx=products.findIndex(p=>p.id===editId);if(idx>=0)products[idx]={...products[idx],...data,updatedAt:new Date().toISOString()};}
  else products.push({id:genId(),...data,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
  save();closeModal();renderDashboard();renderProducts();buildCountryFilter();toast(t('toast.saved'));
}

// ==================== ACTIONS ====================
function archiveProduct(id){const p=products.find(x=>x.id===id);if(p){p.status='archived';save();renderProducts();renderDashboard();toast(t('toast.archived'));}}
function restoreProduct(id){const p=products.find(x=>x.id===id);if(p){p.status='active';save();renderArchive();renderDashboard();toast(t('toast.restored'));}}
function confirmDelete(id){
  document.getElementById('cIcon').textContent='🗑️';
  document.getElementById('cTitle').textContent=t('confirm.deleteTitle');
  document.getElementById('cMsg').textContent=t('confirm.deleteMsg');
  document.getElementById('cBtn').className='btn btn-danger';
  document.getElementById('cBtn').textContent=t('confirm.ok');
  document.getElementById('cBtn').onclick=()=>{products=products.filter(p=>p.id!==id);save();renderProducts();renderArchive();renderDashboard();buildCountryFilter();closeConfirm();toast(t('toast.deleted'));if(document.getElementById('page-detail').style.display==='block')showPage('products');};
  document.getElementById('confirmDialog').classList.add('show');
}
function closeConfirm(){document.getElementById('confirmDialog').classList.remove('show');}

// ==================== SHARE ====================
function openShareModal(id){document.getElementById('shareLinkInput').value=window.location.href.split('#')[0]+'#view='+id;document.getElementById('shareModal').classList.add('show');}
function closeShareModal(){document.getElementById('shareModal').classList.remove('show');}
function copyShareLink(){const i=document.getElementById('shareLinkInput');i.select();navigator.clipboard.writeText(i.value).then(()=>toast(t('toast.linkCopied')));}

// ==================== COPY TEXT ====================
function copyGuideText(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  const flag=countryFlags[p.country]||'🌏';

// ==================== EXPORT/IMPORT ====================
function exportData(){const b=new Blob([JSON.stringify(products,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`ppl-guides-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);toast(t('toast.exported'));}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)){products=[...products,...d];save();renderDashboard();buildCountryFilter();toast(`📂 ${d.length} guides imported`);}}catch{toast('⚠️ Invalid file');}};r.readAsText(f);e.target.value='';}

// ==================== UTILS ====================
function toast(msg){const el=document.createElement('div');el.className='toast';el.innerHTML=msg;document.getElementById('toastC').appendChild(el);setTimeout(()=>el.remove(),3000);}

function handleHash(){
  const hash=window.location.hash;
  if(hash.startsWith('#view=')){document.body.classList.add('viewer-mode');viewDetail(hash.replace('#view=',''));}
  else if(hash.startsWith('#guide=')){viewDetail(hash.replace('#guide=',''));}
}

window.addEventListener('hashchange',handleHash);
document.getElementById('productModal').addEventListener('click',e=>{if(e.target.id==='productModal')closeModal();});
document.getElementById('shareModal').addEventListener('click',e=>{if(e.target.id==='shareModal')closeShareModal();});
document.getElementById('confirmDialog').addEventListener('click',e=>{if(e.target.id==='confirmDialog')closeConfirm();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeConfirm();closeShareModal();}});


// ==================== STORYBOARD (Content Flow) ====================
function addStoryboardStep(){
  tempStoryboard.push({image:null,title:'',desc:''});
  renderStoryboard();
}
function removeStoryboardStep(idx){
  tempStoryboard.splice(idx,1);
  renderStoryboard();
}
function renderStoryboard(){
  const c=document.getElementById('storyboardContainer');
  if(!c)return;
  c.innerHTML=tempStoryboard.map((s,i)=>`
    <div class="storyboard-card">
      <div class="sb-img" onclick="pickStoryboardImg(${i})">
        ${s.image?`<img src="${s.image}"><button class="sb-remove" onclick="event.stopPropagation();tempStoryboard[${i}].image=null;renderStoryboard()">✕</button>`:`<span class="sb-placeholder">🖼️</span>`}
      </div>
      <div class="sb-body">
        <div class="sb-step">SCENE ${i+1}</div>
        <input class="sb-title-input" placeholder="${t('form.sbTitle')||'씬 제목'}" value="${esc(s.title)}" onchange="tempStoryboard[${i}].title=this.value">
        <textarea class="sb-desc-input" placeholder="${t('form.sbDesc')||'씬 설명'}" onchange="tempStoryboard[${i}].desc=this.value">${esc(s.desc)}</textarea>
      </div>
      <div style="padding:0 14px 10px;text-align:right;">
        <button class="btn btn-xs btn-ghost" onclick="removeStoryboardStep(${i})" style="color:var(--danger);font-size:11px;">🗑️ 삭제</button>
      </div>
    </div>
  `).join('');
}
function pickStoryboardImg(idx){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=async e=>{const f=e.target.files[0];if(!f)return;tempStoryboard[idx].image=await fileToB64(f);renderStoryboard();};
  inp.click();
}

// ==================== DO'S & DON'TS WITH IMAGES ====================
function addDoDontItem(type){
  if(type==='dos'){tempDos.push({image:null,text:''});renderDoDontItems('dos');}
  else{tempDonts.push({image:null,text:''});renderDoDontItems('donts');}
}
function removeDoDontItem(type,idx){
  if(type==='dos'){tempDos.splice(idx,1);renderDoDontItems('dos');}
  else{tempDonts.splice(idx,1);renderDoDontItems('donts');}
}
function renderDoDontItems(type){
  const items=type==='dos'?tempDos:tempDonts;
  const cId=type==='dos'?'dosContainer':'dontsContainer';
  const c=document.getElementById(cId);
  if(!c)return;
  const cardClass=type==='dos'?'do-card':'dont-card';
  const emoji=type==='dos'?'✅':'❌';
  c.innerHTML=items.map((item,i)=>`
    <div class="dosdont-card ${cardClass}">
      <div class="dd-img" onclick="pickDoDontImg('${type}',${i})">
        ${item.image?`<img src="${item.image}"><button class="dd-remove" onclick="event.stopPropagation();${type==='dos'?'tempDos':'tempDonts'}[${i}].image=null;renderDoDontItems('${type}')">✕</button>`:`<span class="dd-placeholder">${emoji} 🖼️</span>`}
      </div>
      <div class="dd-body">
        <textarea class="dd-text-input" placeholder="${emoji} 설명을 입력하세요" onchange="${type==='dos'?'tempDos':'tempDonts'}[${i}].text=this.value">${esc(item.text)}</textarea>
      </div>
      <div style="padding:0 12px 8px;text-align:right;">
        <button class="btn btn-xs btn-ghost" onclick="removeDoDontItem('${type}',${i})" style="color:var(--danger);font-size:11px;">🗑️</button>
      </div>
    </div>
  `).join('');
}
function pickDoDontImg(type,idx){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=async e=>{const f=e.target.files[0];if(!f)return;
    if(type==='dos'){tempDos[idx].image=await fileToB64(f);renderDoDontItems('dos');}
    else{tempDonts[idx].image=await fileToB64(f);renderDoDontItems('donts');}
  };inp.click();
}
