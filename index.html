<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPL Guide Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  :root {
    --primary:#8B5CF6;--primary-light:#C4B5FD;--primary-dark:#7C3AED;--primary-bg:#F5F3FF;
    --accent:#EC4899;--accent-light:#FBCFE8;--accent2:#06B6D4;
    --bg:#FAFAFE;--card:#FFFFFF;--text:#1E1B4B;--text-light:#64748B;--text-muted:#94A3B8;--border:#E2E8F0;
    --success:#10B981;--warning:#F59E0B;--danger:#EF4444;--rose:#F43F5E;
    --shadow:0 1px 3px rgba(0,0,0,0.04),0 4px 20px rgba(0,0,0,0.04);
    --shadow-hover:0 8px 40px rgba(139,92,246,0.12);
    --radius:20px;--radius-sm:12px;--radius-xs:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

  body.viewer-mode .sidebar,body.viewer-mode .mobile-toggle{display:none!important;}
  body.viewer-mode .main{margin-left:0;max-width:960px;margin:0 auto;padding:32px 24px;}
  body.viewer-mode .btn-edit-only{display:none!important;}
  .viewer-watermark{display:none;text-align:center;padding:16px;margin-bottom:24px;background:linear-gradient(135deg,var(--primary-bg),#FCE7F3);border-radius:var(--radius-sm);font-size:13px;color:var(--primary-dark);font-weight:600;}
  body.viewer-mode .viewer-watermark{display:block;}
  body.viewer-mode .detail-back{display:none!important;}

  .sidebar{position:fixed;left:0;top:0;width:270px;height:100vh;background:linear-gradient(180deg,#1E1B4B 0%,#312E81 50%,#3B0764 100%);padding:24px 16px;z-index:100;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
  .sidebar-logo{display:flex;align-items:center;gap:14px;padding:4px 8px 24px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:24px;}
  .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(139,92,246,.3);}
  .sidebar-logo h1{color:#fff;font-size:17px;font-weight:800;letter-spacing:-.5px;}
  .sidebar-logo span{color:var(--primary-light);font-size:11px;font-weight:500;display:block;margin-top:2px;}
  .nav-section{margin-bottom:28px;}
  .nav-title{color:rgba(255,255,255,.3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:0 14px;margin-bottom:10px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-size:13.5px;font-weight:500;margin-bottom:2px;}
  .nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);}
  .nav-item.active{background:rgba(139,92,246,.25);color:#fff;font-weight:600;box-shadow:inset 0 0 0 1px rgba(139,92,246,.3);}
  .nav-item .icon{font-size:17px;width:24px;text-align:center;}
  .nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;min-width:22px;text-align:center;}
  .sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.06);}
  .lang-toggle{display:flex;gap:4px;padding:8px 14px;}
  .lang-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .2s;}
  .lang-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

  .main{margin-left:270px;min-height:100vh;padding:32px 44px;max-width:1400px;}
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;flex-wrap:wrap;gap:16px;}
  .page-header h2{font-size:28px;font-weight:900;letter-spacing:-.8px;}
  .page-header p{color:var(--text-light);font-size:14px;margin-top:6px;}
  .header-actions{display:flex;gap:10px;align-items:center;}

  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;border:none;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap;}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 4px 16px rgba(139,92,246,.3);}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(139,92,246,.4);}
  .btn-accent{background:linear-gradient(135deg,var(--accent),#DB2777);color:#fff;}
  .btn-outline{background:var(--card);color:var(--text);border:1.5px solid var(--border);}
  .btn-outline:hover{border-color:var(--primary-light);color:var(--primary);}
  .btn-sm{padding:7px 14px;font-size:12px;border-radius:var(--radius-xs);}
  .btn-xs{padding:5px 10px;font-size:11px;border-radius:6px;}
  .btn-ghost{background:transparent;color:var(--text-light);border:none;}
  .btn-ghost:hover{color:var(--primary);background:var(--primary-bg);}
  .btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{background:#DC2626;}
  .btn-success{background:var(--success);color:#fff;}

  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:36px;}
  .stat-card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);transition:transform .2s;position:relative;overflow:hidden;}
  .stat-card:hover{transform:translateY(-2px);}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .stat-card:nth-child(1)::before{background:linear-gradient(90deg,var(--primary),var(--accent));}
  .stat-card:nth-child(2)::before{background:linear-gradient(90deg,var(--success),#34D399);}
  .stat-card:nth-child(3)::before{background:linear-gradient(90deg,var(--warning),#FBBF24);}
  .stat-card:nth-child(4)::before{background:linear-gradient(90deg,var(--text-muted),#CBD5E1);}
  .stat-icon{width:42px;height:42px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px;}
  .stat-card:nth-child(1) .stat-icon{background:var(--primary-bg);}
  .stat-card:nth-child(2) .stat-icon{background:#ECFDF5;}
  .stat-card:nth-child(3) .stat-icon{background:#FFFBEB;}
  .stat-card:nth-child(4) .stat-icon{background:#F1F5F9;}
  .stat-value{font-size:30px;font-weight:900;letter-spacing:-1px;}
  .stat-label{font-size:13px;color:var(--text-light);font-weight:500;margin-top:2px;}

  .toolbar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
  .search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 16px;flex:1;min-width:220px;transition:border-color .2s,box-shadow .2s;}
  .search-box:focus-within{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(139,92,246,.08);}
  .search-box input{border:none;outline:none;font-size:14px;font-family:inherit;width:100%;background:transparent;}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;width:100%;}
  .filter-label{font-size:12px;font-weight:700;color:var(--text-muted);white-space:nowrap;}
  .pill{padding:7px 16px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text-light);transition:all .15s;}
  .pill:hover{border-color:var(--primary-light);color:var(--primary);}
  .pill.active{background:var(--primary);border-color:var(--primary);color:#fff;}
  .pill-country.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}

  .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;}
  .product-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;transition:all .25s;cursor:pointer;}
  .product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);border-color:var(--primary-light);}
  .product-thumb{width:100%;height:180px;position:relative;overflow:hidden;}
  .product-thumb img{width:100%;height:100%;object-fit:cover;}
  .product-thumb-placeholder{background:linear-gradient(135deg,#EDE9FE 0%,#FCE7F3 50%,#E0F2FE 100%);display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:48px;opacity:.7;}
  .card-badges{position:absolute;top:12px;left:12px;display:flex;gap:6px;flex-wrap:wrap;}
  .card-badge{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;backdrop-filter:blur(8px);}
  .badge-active{background:rgba(16,185,129,.15);color:#059669;border:1px solid rgba(16,185,129,.2);}
  .badge-draft{background:rgba(245,158,11,.15);color:#D97706;border:1px solid rgba(245,158,11,.2);}
  .badge-archived{background:rgba(100,116,139,.15);color:#475569;border:1px solid rgba(100,116,139,.2);}
  .badge-country{background:rgba(6,182,212,.12);color:#0891B2;border:1px solid rgba(6,182,212,.15);}
  .card-type{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(139,92,246,.12);color:var(--primary-dark);border:1px solid rgba(139,92,246,.15);backdrop-filter:blur(8px);}
  .product-card-body{padding:20px 24px 8px;}
  .product-name{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px;}
  .product-brand{font-size:13px;color:var(--primary);font-weight:600;margin-bottom:10px;}
  .product-desc{font-size:13px;color:var(--text-light);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .product-card-footer{padding:14px 24px 18px;display:flex;justify-content:space-between;align-items:center;}
  .product-tags{display:flex;gap:6px;flex-wrap:wrap;}
  .mini-tag{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg);color:var(--text-muted);}
  .card-actions{display:flex;gap:2px;}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);z-index:200;justify-content:center;align-items:flex-start;padding:24px 20px;overflow-y:auto;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:780px;box-shadow:0 25px 60px rgba(0,0,0,.25);animation:modalIn .3s ease;border:1px solid var(--border);}
  @keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
  .modal-header{padding:24px 32px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .modal-header h3{font-size:20px;font-weight:800;}
  .modal-close{width:36px;height:36px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-light);transition:all .2s;}
  .modal-close:hover{background:var(--danger);color:#fff;border-color:var(--danger);}
  .modal-body{padding:32px;max-height:70vh;overflow-y:auto;}
  .modal-footer{padding:20px 32px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

  .load-existing-bar{display:flex;gap:10px;align-items:center;padding:16px;background:var(--primary-bg);border-radius:var(--radius-sm);margin-bottom:28px;flex-wrap:wrap;}
  .load-existing-bar label{font-size:13px;font-weight:600;color:var(--primary-dark);white-space:nowrap;}
  .load-existing-bar select{flex:1;min-width:200px;padding:8px 12px;border:1.5px solid var(--primary-light);border-radius:var(--radius-xs);font-size:13px;font-family:inherit;outline:none;background:var(--card);}

  .form-section{margin-bottom:32px;padding-bottom:28px;border-bottom:1px solid var(--border);}
  .form-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .form-section-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:20px;}
  .badge-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--primary-bg);}
  .form-group{margin-bottom:18px;}.form-group:last-child{margin-bottom:0;}
  .form-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;margin-bottom:7px;}
  .form-label .req{color:var(--accent);font-size:11px;}
  .form-hint{font-size:11px;color:var(--text-muted);font-weight:400;}
  .form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13.5px;font-family:inherit;color:var(--text);background:var(--card);transition:border-color .2s,box-shadow .2s;outline:none;}
  .form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(139,92,246,.08);}
  .form-textarea{resize:vertical;min-height:80px;line-height:1.8;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .form-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}

  .img-upload-area{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);position:relative;}
  .img-upload-area:hover,.img-upload-area.dragover{border-color:var(--primary);background:var(--primary-bg);}
  .img-upload-area.dragover{box-shadow:0 0 0 4px rgba(139,92,246,.12);}
  .img-upload-area .icon{font-size:32px;margin-bottom:8px;display:block;}
  .img-upload-area .text{font-size:13px;color:var(--text-light);}
  .img-upload-area .hint{font-size:11px;color:var(--text-muted);margin-top:4px;}
  .img-preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:12px;}
  .img-preview-item{position:relative;border-radius:var(--radius-xs);overflow:hidden;aspect-ratio:1;background:var(--bg);border:1px solid var(--border);}
  .img-preview-item img{width:100%;height:100%;object-fit:cover;}
  .img-preview-item .remove-img{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .img-preview-item .img-label{position:absolute;bottom:0;left:0;right:0;padding:3px 6px;background:rgba(0,0,0,.5);color:#fff;font-size:10px;font-weight:600;text-align:center;}

  .detail-back{display:inline-flex;align-items:center;gap:8px;color:var(--text-light);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:24px;padding:6px 12px;border-radius:var(--radius-xs);transition:all .2s;}
  .detail-back:hover{color:var(--primary);background:var(--primary-bg);}
  .detail-hero{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;margin-bottom:24px;}
  .detail-hero-banner{height:200px;background:linear-gradient(135deg,#EDE9FE 0%,#FCE7F3 50%,#E0F2FE 100%);position:relative;overflow:hidden;}
  .detail-hero-banner img{width:100%;height:100%;object-fit:cover;}
  .detail-hero-body{padding:32px 36px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;}
  .detail-hero h2{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px;}
  .detail-hero .brand-name{font-size:14px;color:var(--primary);font-weight:600;}
  .detail-meta{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;}
  .detail-meta-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-light);background:var(--bg);padding:6px 12px;border-radius:var(--radius-xs);}
  .detail-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
  .detail-section{background:var(--card);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);border:1px solid var(--border);}
  .detail-section.full{grid-column:1/-1;}
  .section-header{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .section-icon{width:32px;height:32px;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .section-content{font-size:14px;color:var(--text-light);line-height:2;white-space:pre-wrap;}
  .selling-point-item{padding:14px 16px;background:var(--bg);border-radius:var(--radius-xs);margin-bottom:10px;border-left:3px solid var(--primary);}
  .selling-point-item strong{display:block;font-size:13px;font-weight:700;color:var(--primary-dark);margin-bottom:4px;}
  .selling-point-item span{font-size:13px;color:var(--text-light);line-height:1.7;}
  .tag-grid{display:flex;gap:8px;flex-wrap:wrap;}
  .guide-tag{padding:6px 14px;border-radius:var(--radius-xs);font-size:12px;font-weight:600;line-height:1.5;}
  .tag-do{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0;}
  .tag-dont{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;}
  .tag-hashtag{background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;}
  .tag-mention{background:#F5F3FF;color:#7C3AED;border:1px solid #DDD6FE;}
  .tag-caution{background:#FFFBEB;color:#D97706;border:1px solid #FDE68A;}
  .content-flow-list{counter-reset:flow;}
  .flow-step{display:flex;gap:16px;align-items:flex-start;padding:16px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:10px;}
  .flow-step::before{counter-increment:flow;content:'#' counter(flow);flex-shrink:0;width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .flow-step-content{flex:1;}
  .flow-step-content strong{display:block;font-size:14px;font-weight:700;margin-bottom:4px;}
  .flow-step-content p{font-size:13px;color:var(--text-light);line-height:1.7;}
  .visual-guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
  .visual-item{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);background:var(--bg);}
  .visual-item img{width:100%;aspect-ratio:1;object-fit:cover;}
  .visual-item .label{padding:8px 12px;font-size:12px;font-weight:600;color:var(--text-light);text-align:center;}

  .empty-state{text-align:center;padding:80px 20px;}
  .empty-state .icon{font-size:56px;margin-bottom:16px;}
  .empty-state h3{font-size:18px;margin-bottom:8px;}
  .empty-state p{color:var(--text-muted);font-size:14px;margin-bottom:24px;}

  .toast-container{position:fixed;bottom:28px;right:28px;z-index:300;display:flex;flex-direction:column;gap:8px;}
  .toast{padding:14px 22px;border-radius:var(--radius-sm);background:var(--text);color:#fff;font-size:13.5px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.2);animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;display:flex;align-items:center;gap:8px;}
  @keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
  @keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateY(-8px);}}

  .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:250;justify-content:center;align-items:center;}
  .confirm-overlay.show{display:flex;}
  .confirm-box{background:var(--card);border-radius:var(--radius);padding:36px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .confirm-box .c-icon{font-size:40px;margin-bottom:16px;}
  .confirm-box h4{font-size:18px;margin-bottom:8px;}
  .confirm-box p{color:var(--text-light);font-size:14px;margin-bottom:24px;}
  .confirm-actions{display:flex;gap:10px;justify-content:center;}

  .share-link-box{display:flex;gap:8px;align-items:center;padding:14px;background:var(--bg);border-radius:var(--radius-sm);border:1.5px solid var(--border);margin-top:12px;}
  .share-link-box input{flex:1;border:none;background:transparent;font-size:13px;font-family:'Courier New',monospace;color:var(--text);outline:none;}

  .mobile-toggle{display:none;position:fixed;top:14px;left:14px;z-index:150;width:44px;height:44px;border-radius:var(--radius-sm);background:var(--card);border:1.5px solid var(--border);cursor:pointer;font-size:20px;align-items:center;justify-content:center;box-shadow:var(--shadow);}
  @media(max-width:960px){
    .mobile-toggle{display:flex;}.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}
    .main{margin-left:0;padding:24px 16px;padding-top:72px;}

// ==================== AUTH FUNCTIONS ====================
function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function showLogin() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('signupForm').style.display = 'none';
  document.getElementById('authError').style.display = 'none';
}

function showSignup() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('signupForm').style.display = 'block';
  document.getElementById('authError').style.display = 'none';
}

async function handleLogin() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password) { showAuthError('이메일과 비밀번호를 입력해주세요.'); return; }

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) throw error;
    onAuthSuccess(data.user);
  } catch (e) {
    showAuthError(e.message === 'Invalid login credentials' ? '이메일 또는 비밀번호가 올바르지 않습니다.' : e.message);
  }
}

async function handleSignup() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  if (!name || !email || !password) { showAuthError('모든 필드를 입력해주세요.'); return; }
  if (password.length < 6) { showAuthError('비밀번호는 6자 이상이어야 합니다.'); return; }

  try {
    const { data, error } = await supabaseClient.auth.signUp({ 
      email, password, 
      options: { data: { display_name: name } }
    });
    if (error) throw error;

    // 프로필 생성
    await supabaseClient.from('user_profiles').insert({
      id: data.user.id, email, display_name: name, role: 'editor'
    });

    onAuthSuccess(data.user);
  } catch (e) {
    showAuthError(e.message.includes('already registered') ? '이미 가입된 이메일입니다.' : e.message);
  }
}

async function handleLogout() {
  await supabaseClient.auth.signOut();
  currentUser = null;
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('userBar').style.display = 'none';
}

function onAuthSuccess(user) {
  currentUser = user;
  document.getElementById('authOverlay').style.display = 'none';

  // 사용자 바 업데이트
  const bar = document.getElementById('userBar');
  bar.style.display = 'flex';
  const nameStr = user.user_metadata?.display_name || user.email.split('@')[0];
  document.getElementById('userAvatar').textContent = nameStr.charAt(0).toUpperCase();
  document.getElementById('userEmail').textContent = nameStr;
  document.getElementById('userRole').textContent = user.email;

  // 데이터 로드
  loadFromSupabase();
}

// ==================== SUPABASE DATA OPERATIONS ====================
function showSync(type) {
  const el = document.getElementById('syncIndicator');
  el.className = 'sync-indicator ' + type;
  if (type === 'syncing') {
    el.innerHTML = '<span>⟳</span><span>저장 중...</span>';
  } else if (type === 'synced') {
    el.innerHTML = '<span>✓</span><span>저장 완료</span>';
    setTimeout(() => el.className = 'sync-indicator', 2000);
  } else if (type === 'error') {
    el.innerHTML = '<span>✕</span><span>저장 실패</span>';
    setTimeout(() => el.className = 'sync-indicator', 3000);
  }
}

// DB에서 field 이름 변환 (camelCase → snake_case)
function toDbFields(p) {
  return {
    id: p.id,
    product_name: p.name,
    brand: p.brand,
    category: p.category || 'cream',
    status: p.status || 'active',
    country: p.country || 'KR',
    how_to_use: p.howToUse || '',
    content_flow: p.contentFlow || '',
    required_angles: p.visualGuide || '',
    tags_mentions: JSON.stringify({
      productType: p.productType || '',
      priceInfo: p.priceInfo || '',
      salesChannel: p.salesChannel || '',
      startDate: p.startDate || '',
      endDate: p.endDate || '',
      positioning: p.positioning || '',
      sellingPoints: p.sellingPoints || '',
      ingredients: p.ingredients || '',
      brandTag: p.brandTag || '',
      hashtags: p.hashtags || '',
      keyMention: p.keyMention || '',
      reference: p.reference || ''
    }),
    dos: p.dos || '',
    donts: p.donts || '',
    caution: p.cautions || '',
    additional_notes: '',
    main_image: p.mainImage || null,
    share_token: p.shareToken || null,
    created_by: currentUser?.id || null
  };
}

// DB → 앱 field 변환 (snake_case → camelCase)
function fromDbFields(d) {
  let extra = {};
  try { extra = JSON.parse(d.tags_mentions || '{}'); } catch(e) {}
  return {
    id: d.id,
    name: d.product_name,
    brand: d.brand,
    category: d.category || 'cream',
    status: d.status || 'active',
    country: d.country || 'KR',
    productType: extra.productType || '',
    priceInfo: extra.priceInfo || '',
    salesChannel: extra.salesChannel || '',
    startDate: extra.startDate || '',
    endDate: extra.endDate || '',
    positioning: extra.positioning || '',
    sellingPoints: extra.sellingPoints || '',
    ingredients: extra.ingredients || '',
    howToUse: d.how_to_use || '',
    contentFlow: d.content_flow || '',
    visualGuide: d.required_angles || '',
    brandTag: extra.brandTag || '',
    hashtags: extra.hashtags || '',
    keyMention: extra.keyMention || '',
    dos: d.dos || '',
    donts: d.donts || '',
    cautions: d.caution || '',
    reference: extra.reference || '',
    mainImage: d.main_image || null,
    refImages: [],
    shareToken: d.share_token || null,
    createdAt: d.created_at,
    updatedAt: d.updated_at
  };
}

async function loadFromSupabase() {
  document.getElementById('loadingOverlay').style.display = 'flex';
  try {
    const { data, error } = await supabaseClient
      .from('guides')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) throw error;
    products = (data || []).map(fromDbFields);
    save(); // localStorage에도 캐시
    renderDashboard(); renderProducts(); renderArchive();
    updateStats(); buildCatFilter(); buildCountryFilter();
  } catch(e) {
    console.error('Load error:', e);
    toast('데이터 로드 실패: ' + e.message);
    // fallback: localStorage에서 로드
    products = JSON.parse(localStorage.getItem('ppl_cosme_v3') || '[]');
  } finally {
    document.getElementById('loadingOverlay').style.display = 'none';
  }
}

async function saveToSupabase(product) {
  showSync('syncing');
  try {
    const dbData = toDbFields(product);
    const { error } = await supabaseClient
      .from('guides')
      .upsert(dbData, { onConflict: 'id' });

    if (error) throw error;
    showSync('synced');
  } catch(e) {
    console.error('Save error:', e);
    showSync('error');
    toast('서버 저장 실패: ' + e.message);
  }
}

async function deleteFromSupabase(id) {
  showSync('syncing');
  try {
    const { error } = await supabaseClient
      .from('guides')
      .delete()
      .eq('id', id);

    if (error) throw error;
    showSync('synced');
  } catch(e) {
    console.error('Delete error:', e);
    showSync('error');
  }
}

// ==================== IMAGE UPLOAD TO SUPABASE STORAGE ====================
async function uploadImageToStorage(file) {
  const ext = file.name.split('.').pop();
  const fileName = 'img_' + Date.now() + '_' + Math.random().toString(36).substr(2,6) + '.' + ext;
  const filePath = 'uploads/' + fileName;

  try {
    const { data, error } = await supabaseClient.storage
      .from('guide-images')
      .upload(filePath, file, { cacheControl: '3600', upsert: false });

    if (error) throw error;

    const { data: urlData } = supabaseClient.storage
      .from('guide-images')
      .getPublicUrl(filePath);

    return urlData.publicUrl;
  } catch(e) {
    console.error('Upload error:', e);
    toast('이미지 업로드 실패: ' + e.message);
    // fallback: base64
    return await fileToB64Local(file);
  }
}

function fileToB64Local(f) {
  return new Promise(r => {
    const rd = new FileReader();
    rd.onload = e => r(e.target.result);
    rd.readAsDataURL(f);
  });
}

// ==================== SHARE LINK (DB-based) ====================
function generateShareToken() {
  return 'share_' + Date.now().toString(36) + Math.random().toString(36).substr(2,8);
}

async function openShareModalDB(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;

  let token = p.shareToken;
  if (!token) {
    token = generateShareToken();
    p.shareToken = token;
    // DB에 share_token 저장
    await supabaseClient
      .from('guides')
      .update({ share_token: token })
      .eq('id', id);
  }

  const shareUrl = window.location.href.split('#')[0].split('?')[0] + '?share=' + token;
  document.getElementById('shareLinkInput').value = shareUrl;
  document.getElementById('shareModal').classList.add('show');
}

async function loadSharedGuide(token) {
  document.getElementById('loadingOverlay').style.display = 'flex';
  try {
    const { data, error } = await supabaseClient
      .from('guides')
      .select('*')
      .eq('share_token', token)
      .single();

    if (error) throw error;
    if (!data) { toast('가이드를 찾을 수 없습니다.'); return; }

    const product = fromDbFields(data);
    products = [product];

    // 뷰어 모드로 표시
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('loadingOverlay').style.display = 'none';
    document.body.classList.add('viewer-mode');
    isViewerMode = true;
    viewDetail(product.id);
  } catch(e) {
    console.error('Share load error:', e);
    toast('공유 가이드를 불러올 수 없습니다.');
    document.getElementById('loadingOverlay').style.display = 'none';
  }
}

// ==================== APP INIT (with Supabase) ====================
async function initApp() {
  // 1. 공유 링크 체크
  const urlParams = new URLSearchParams(window.location.search);
  const shareToken = urlParams.get('share');

  if (shareToken) {
    // 공유 링크로 접속 → 로그인 불필요, 바로 가이드 표시
    isViewerMode = true;
    await loadSharedGuide(shareToken);
    return;
  }

  // 2. 기존 세션 체크
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) {
    onAuthSuccess(session.user);
  } else {
    // 로그인 화면 표시
    document.getElementById('authOverlay').style.display = 'flex';
  }

  // 3. Auth 상태 변화 감지
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      onAuthSuccess(session.user);
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
    }
  });
}

// ==================== DRAG & DROP ====================
function setupDragDrop(areaId,isMultiple){
  const area=document.getElementById(areaId);
  if(!area)return;
  ['dragenter','dragover'].forEach(ev=>area.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();area.classList.add('dragover');}));
  ['dragleave','drop'].forEach(ev=>area.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();area.classList.remove('dragover');}));
  area.addEventListener('drop',async e=>{
    const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
    if(!files.length)return;
    if(isMultiple){
      for(const f of files) tempRefImgs.push(await fileToB64(f));
      renderRefPreviews();
    } else {
      tempMainImg=await fileToB64(files[0]);
      document.getElementById('mainImgPreview').innerHTML=`<div class="img-preview-item"><img src="${tempMainImg}"><button class="remove-img" onclick="tempMainImg=null;this.parentElement.remove()">✕</button><div class="img-label">${t('form.mainImg')}</div></div>`;
    }
  });
}

// ==================== IMAGE ====================
function fileToB64(f){
  // Supabase Storage 사용 가능하면 업로드, 아니면 base64 fallback
  if(typeof supabaseClient!=='undefined' && currentUser){
    return uploadImageToStorage(f);
  }
  return new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(f);});
}
async function handleMainImg(e){
  const f=e.target.files[0];if(!f)return;
  tempMainImg=await fileToB64(f);
  document.getElementById('mainImgPreview').innerHTML=`<div class="img-preview-item"><img src="${tempMainImg}"><button class="remove-img" onclick="tempMainImg=null;this.parentElement.remove()">✕</button><div class="img-label">${t('form.mainImg')}</div></div>`;
}
async function handleRefImgs(e){for(const f of Array.from(e.target.files))tempRefImgs.push(await fileToB64(f));renderRefPreviews();}
function renderRefPreviews(){
  document.getElementById('refImgsPreview').innerHTML=tempRefImgs.map((img,i)=>`<div class="img-preview-item"><img src="${img}"><button class="remove-img" onclick="tempRefImgs.splice(${i},1);renderRefPreviews()">✕</button><div class="img-label">#${i+1}</div></div>`).join('');
}

function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');

  const tgt=document.getElementById('page-'+page);if(tgt)tgt.style.display='block';
  const nav=document.querySelector(`.nav-item[data-page="${page}"]`);if(nav)nav.classList.add('active');
  document.querySelector('.sidebar').classList.remove('open');
  if(page==='dashboard')renderDashboard();

function updateStats(){
  const all=products.length,act=products.filter(p=>p.status==='active').length,
    dft=products.filter(p=>p.status==='draft').length,arc=products.filter(p=>p.status==='archived').length;
  document.getElementById('s-total').textContent=all;document.getElementById('s-active').textContent=act;
  document.getElementById('s-draft').textContent=dft;document.getElementById('s-archived').textContent=arc;
  document.getElementById('navPC').textContent=all-arc;document.getElementById('navAC').textContent=arc;

function setFilter(type,val,el){
  if(type==='cat'){filterCat=val;el.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');}
  else{filterCountry=val;el.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');}

}

// ==================== CARD ====================
function makeCard(p,mode){
  const catE=catEmojis[p.category]||'📌';
  const stClass=p.status==='active'?'badge-active':p.status==='draft'?'badge-draft':'badge-archived';
  const stLabel=t('status.'+p.status);
  const dateFmt=lang==='ko'?'ko-KR':'en-US';
  const date=new Date(p.createdAt).toLocaleDateString(dateFmt,{year:'numeric',month:'short',day:'numeric'});
  const flag=countryFlags[p.country]||'🌏';
  const thumb=p.mainImage?`<img src="${p.mainImage}">`:`<div class="product-thumb-placeholder">${catE}</div>`;
  let actionBtns='';
  if(mode==='archive'){
    actionBtns=`<button class="btn btn-xs btn-success" onclick="event.stopPropagation();restoreProduct('${p.id}')">${t('btn.restore')}</button><button class="btn btn-xs btn-danger" onclick="event.stopPropagation();confirmDelete('${p.id}')">${t('btn.delete')}</button>`;
  } else {
    actionBtns=`<button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();openEditModal('${p.id}')" title="${t('btn.edit')}">✏️</button><button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();archiveProduct('${p.id}')" title="${t('btn.archive')}">🗄️</button><button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();confirmDelete('${p.id}')" title="${t('btn.delete')}" style="color:var(--danger)">🗑️</button>`;
  }
  return `<div class="product-card" onclick="viewDetail('${p.id}')"><div class="product-thumb">${thumb}<div class="card-badges"><span class="card-badge ${stClass}">${stLabel}</span><span class="card-badge badge-country">${flag} ${p.country||'KR'}</span></div><span class="card-type">${catE} ${t('cat.'+(p.category||'cream'))}</span></div><div class="product-card-body"><div class="product-name">${esc(p.name)}</div><div class="product-brand">${esc(p.brand)}</div><div class="product-desc">${esc(p.positioning||p.sellingPoints||'')}</div></div><div class="product-card-footer"><div class="product-tags"><span class="mini-tag">📅 ${date}</span>${p.priceInfo?`<span class="mini-tag">💰 ${esc(p.priceInfo).substring(0,25)}</span>`:''}</div><div class="card-actions" onclick="event.stopPropagation()">${actionBtns}</div></div></div>`;
}

function emptyH(icon,tk,dk,btn){return `<div class="empty-state" style="grid-column:1/-1"><div class="icon">${icon}</div><h3>${t(tk)}</h3><p>${t(dk)}</p>${btn||''}</div>`;}

function renderDashboard(){
  updateStats();
  const recent=[...products].filter(p=>p.status!=='archived').sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);
  document.getElementById('recentProducts').innerHTML=recent.length?recent.map(p=>makeCard(p,'normal')).join(''):emptyH('💄','empty.noGuide','empty.noGuideDesc',`<button class="btn btn-primary" onclick="loadSampleData()">✨ ${t('nav.sample')}</button>`);
}

function renderProducts(){
  updateStats();
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  let list=products.filter(p=>p.status!=='archived');
  if(filterCat!=='all')list=list.filter(p=>p.category===filterCat);
  if(filterCountry!=='all')list=list.filter(p=>(p.country||'KR')===filterCountry);
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q));
  list.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  document.getElementById('productList').innerHTML=list.length?list.map(p=>makeCard(p,'normal')).join(''):emptyH('🔍','empty.noResult','empty.noResultDesc');
}

function renderArchive(){
  const q=(document.getElementById('archiveSearch')?.value||'').toLowerCase();
  let list=products.filter(p=>p.status==='archived');
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q));
  list.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  document.getElementById('archiveList').innerHTML=list.length?list.map(p=>makeCard(p,'archive')).join(''):emptyH('🗄️','empty.noArchive','empty.noArchiveDesc');
}

function handleHash(){
  // 먼저 ?share= 파라미터 체크 (새 공유 방식)
  const urlParams=new URLSearchParams(window.location.search);
  const shareToken=urlParams.get('share');
  if(shareToken && !isViewerMode){
    // initApp에서 이미 처리했으므로 여기선 스킵
    return;
  }

  // 기존 #view= 해시 방식도 지원 (하위 호환)
  const hash=window.location.hash;
  if(hash.startsWith('#view=')){
    document.body.classList.add('viewer-mode');
    const viewId=hash.replace('#view=','');
    // DB에서 로드 시도
    if(typeof supabaseClient!=='undefined'){
      supabaseClient.from('guides').select('*').eq('id',viewId).single().then(({data})=>{
        if(data){
          const p=fromDbFields(data);
          if(!products.find(x=>x.id===p.id))products.push(p);
          viewDetail(p.id);
        } else { viewDetail(viewId); }
      }).catch(()=>viewDetail(viewId));
    } else { viewDetail(viewId); }
  }
  else if(hash.startsWith('#guide=')){viewDetail(hash.replace('#guide=',''));}
}

async function handleLogin() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if (!email || !password) { showAuthError('이메일과 비밀번호를 입력해주세요.'); return; }

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) throw error;
    onAuthSuccess(data.user);
  } catch (e) {
    showAuthError(e.message === 'Invalid login credentials' ? '이메일 또는 비밀번호가 올바르지 않습니다.' : e.message);
  }
}

async function handleSignup() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  if (!name || !email || !password) { showAuthError('모든 필드를 입력해주세요.'); return; }
  if (password.length < 6) { showAuthError('비밀번호는 6자 이상이어야 합니다.'); return; }

  try {
    const { data, error } = await supabaseClient.auth.signUp({ 
      email, password, 
      options: { data: { display_name: name } }
    });
    if (error) throw error;

    // 프로필 생성
    await supabaseClient.from('user_profiles').insert({
      id: data.user.id, email, display_name: name, role: 'editor'
    });

    onAuthSuccess(data.user);
  } catch (e) {
    showAuthError(e.message.includes('already registered') ? '이미 가입된 이메일입니다.' : e.message);
  }
}

async function handleLogout() {
  await supabaseClient.auth.signOut();
  currentUser = null;
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('userBar').style.display = 'none';
}

  document.getElementById('loadingOverlay').style.display = 'flex';
  try {
    const { data, error } = await supabaseClient
      .from('guides')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) throw error;
    products = (data || []).map(fromDbFields);
    save(); // localStorage에도 캐시
    renderDashboard(); renderProducts(); renderArchive();
    updateStats(); buildCatFilter(); buildCountryFilter();
  } catch(e) {
    console.error('Load error:', e);
    toast('데이터 로드 실패: ' + e.message);
    // fallback: localStorage에서 로드
    products = JSON.parse(localStorage.getItem('ppl_cosme_v3') || '[]');
  } finally {
    document.getElementById('loadingOverlay').style.display = 'none';
  }

  try {
    const dbData = toDbFields(product);
    const { error } = await supabaseClient
      .from('guides')
      .upsert(dbData, { onConflict: 'id' });

    if (error) throw error;
    showSync('synced');
  } catch(e) {
    console.error('Save error:', e);
    showSync('error');
    toast('서버 저장 실패: ' + e.message);
  }
}

async function deleteFromSupabase(id) {
  showSync('syncing');
  try {
    const { error } = await supabaseClient
      .from('guides')
      .delete()
      .eq('id', id);

    if (error) throw error;
    showSync('synced');
  } catch(e) {
    console.error('Delete error:', e);
    showSync('error');
  }
}

// ==================== IMAGE UPLOAD TO SUPABASE STORAGE ====================
async function uploadImageToStorage(file) {
  const ext = file.name.split('.').pop();
  const fileName = 'img_' + Date.now() + '_' + Math.random().toString(36).substr(2,6) + '.' + ext;
  const filePath = 'uploads/' + fileName;

  try {
    const { data, error } = await supabaseClient.storage
      .from('guide-images')
      .upload(filePath, file, { cacheControl: '3600', upsert: false });

    if (error) throw error;

    const { data: urlData } = supabaseClient.storage
      .from('guide-images')
      .getPublicUrl(filePath);

    return urlData.publicUrl;
  } catch(e) {
    console.error('Upload error:', e);
    toast('이미지 업로드 실패: ' + e.message);
    // fallback: base64
    return await fileToB64Local(file);
  }
}

function fileToB64Local(f) {
  return new Promise(r => {
    const rd = new FileReader();
    rd.onload = e => r(e.target.result);
    rd.readAsDataURL(f);
  });
}

// ==================== SHARE LINK (DB-based) ====================
function generateShareToken() {
  return 'share_' + Date.now().toString(36) + Math.random().toString(36).substr(2,8);
}

async function openShareModalDB(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;

  let token = p.shareToken;
  if (!token) {
    token = generateShareToken();
    p.shareToken = token;
    // DB에 share_token 저장
    await supabaseClient
      .from('guides')
      .update({ share_token: token })
      .eq('id', id);
  }

  const shareUrl = window.location.href.split('#')[0].split('?')[0] + '?share=' + token;
  document.getElementById('shareLinkInput').value = shareUrl;
  document.getElementById('shareModal').classList.add('show');
}

async function loadSharedGuide(token) {
  document.getElementById('loadingOverlay').style.display = 'flex';
  try {
    const { data, error } = await supabaseClient
      .from('guides')
      .select('*')
      .eq('share_token', token)
      .single();

    if (error) throw error;
    if (!data) { toast('가이드를 찾을 수 없습니다.'); return; }

    const product = fromDbFields(data);
    products = [product];

    // 뷰어 모드로 표시
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('loadingOverlay').style.display = 'none';
    document.body.classList.add('viewer-mode');
    isViewerMode = true;
    viewDetail(product.id);
  } catch(e) {
    console.error('Share load error:', e);
    toast('공유 가이드를 불러올 수 없습니다.');
    document.getElementById('loadingOverlay').style.display = 'none';
  }
}

// ==================== APP INIT (with Supabase) ====================
async function initApp() {
  // 1. 공유 링크 체크
  const urlParams = new URLSearchParams(window.location.search);
  const shareToken = urlParams.get('share');

  if (shareToken) {
    // 공유 링크로 접속 → 로그인 불필요, 바로 가이드 표시
    isViewerMode = true;
    await loadSharedGuide(shareToken);
    return;
  }

  // 2. 기존 세션 체크
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) {
    onAuthSuccess(session.user);
  } else {
    // 로그인 화면 표시
    document.getElementById('authOverlay').style.display = 'flex';
  }

  // 3. Auth 상태 변화 감지
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      onAuthSuccess(session.user);
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
    }
  });
}
