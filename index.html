<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPL Guide Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
:root{--primary:#8B5CF6;--primary-light:#C4B5FD;--primary-dark:#7C3AED;--primary-bg:#F5F3FF;--accent:#EC4899;--accent-light:#FBCFE8;--accent2:#06B6D4;--bg:#FAFAFE;--card:#FFFFFF;--text:#1E1B4B;--text-light:#64748B;--text-muted:#94A3B8;--border:#E2E8F0;--success:#10B981;--warning:#F59E0B;--danger:#EF4444;--rose:#F43F5E;--shadow:0 1px 3px rgba(0,0,0,0.04),0 4px 20px rgba(0,0,0,0.04);--shadow-hover:0 8px 40px rgba(139,92,246,0.12);--radius:20px;--radius-sm:12px;--radius-xs:8px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1E1B4B 0%,#312E81 40%,#3B0764 100%);padding:24px;}
.auth-card{background:var(--card);border-radius:var(--radius);padding:48px 40px;max-width:420px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.3);text-align:center;}
.auth-logo{font-size:48px;margin-bottom:16px;}
.auth-card h1{font-size:24px;font-weight:800;margin-bottom:4px;}
.auth-card p{font-size:13px;color:var(--text-light);margin-bottom:32px;}
.auth-input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:14px;margin-bottom:12px;outline:none;transition:border .2s;font-family:inherit;}
.auth-input:focus{border-color:var(--primary);}
.auth-btn{width:100%;padding:14px;border:none;border-radius:var(--radius-xs);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;}
.auth-btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;}
.auth-btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(139,92,246,.35);}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:var(--radius-xs);padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:10px;border:none;background:transparent;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-light);transition:all .2s;font-family:inherit;}
.auth-tab.active{background:var(--card);color:var(--primary);box-shadow:var(--shadow);}
.auth-error{color:var(--danger);font-size:12px;margin-bottom:12px;display:none;}
.auth-loading{display:none;align-items:center;justify-content:center;gap:8px;padding:12px;color:var(--primary);font-size:13px;}
.auth-loading.show{display:flex;}
.spinner{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.user-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;margin:auto 8px 8px;background:rgba(255,255,255,.06);border-radius:var(--radius-sm);}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;}
.user-info{flex:1;overflow:hidden;}
.user-email{color:rgba(255,255,255,.7);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-bar button{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:11px;transition:all .2s;}
.user-bar button:hover{background:rgba(255,255,255,.2);color:#fff;}

.sync-indicator{position:fixed;top:16px;right:16px;padding:8px 14px;border-radius:var(--radius-xs);font-size:12px;font-weight:600;z-index:999;display:none;align-items:center;gap:6px;backdrop-filter:blur(12px);}
.sync-indicator.syncing{display:flex;background:rgba(139,92,246,.1);color:var(--primary);border:1px solid rgba(139,92,246,.2);}
.sync-indicator.saved{display:flex;background:rgba(16,185,129,.1);color:var(--success);border:1px solid rgba(16,185,129,.2);}
.sync-indicator.error{display:flex;background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2);}

body.viewer-mode .sidebar,body.viewer-mode .mobile-toggle{display:none!important;}
body.viewer-mode .main{margin-left:0;max-width:960px;margin:0 auto;padding:32px 24px;}
body.viewer-mode .btn-edit-only{display:none!important;}
.viewer-watermark{display:none;text-align:center;padding:16px;margin-bottom:24px;background:linear-gradient(135deg,var(--primary-bg),#FCE7F3);border-radius:var(--radius-sm);font-size:13px;color:var(--primary-dark);font-weight:600;}
body.viewer-mode .viewer-watermark{display:block;}
body.viewer-mode .detail-back{display:none!important;}

.sidebar{position:fixed;left:0;top:0;width:270px;height:100vh;background:linear-gradient(180deg,#1E1B4B 0%,#312E81 50%,#3B0764 100%);padding:24px 16px;z-index:100;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
.sidebar-logo{display:flex;align-items:center;gap:14px;padding:4px 8px 24px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:24px;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(139,92,246,.3);}
.sidebar-logo h1{color:#fff;font-size:17px;font-weight:800;letter-spacing:-.5px;}
.sidebar-logo span{color:var(--primary-light);font-size:11px;font-weight:500;display:block;margin-top:2px;}
.nav-section{margin-bottom:28px;}
.nav-title{color:rgba(255,255,255,.3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:0 14px;margin-bottom:10px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-size:13.5px;font-weight:500;margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);}
.nav-item.active{background:rgba(139,92,246,.25);color:#fff;font-weight:600;box-shadow:inset 0 0 0 1px rgba(139,92,246,.3);}
.nav-item .icon{font-size:18px;width:22px;text-align:center;}
.nav-badge{margin-left:auto;background:rgba(139,92,246,.3);color:var(--primary-light);padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.06);}
.lang-toggle{display:flex;gap:6px;padding:8px;}
.lang-btn{flex:1;padding:7px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.4);border-radius:var(--radius-xs);cursor:pointer;font-size:11px;font-weight:600;transition:all .2s;}
.lang-btn:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.7);}
.lang-btn.active{background:rgba(139,92,246,.25);border-color:var(--primary);color:#fff;}

.main{margin-left:270px;padding:32px 40px;min-height:100vh;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:16px;}
.page-header h2{font-size:26px;font-weight:800;letter-spacing:-.5px;}
.page-header p{color:var(--text-light);font-size:14px;margin-top:4px;}
.header-actions{display:flex;gap:10px;flex-wrap:wrap;}
.btn{padding:10px 22px;border:none;border-radius:var(--radius-xs);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;font-family:inherit;}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 4px 16px rgba(139,92,246,.25);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(139,92,246,.35);}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-bg);}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--rose));color:#fff;}
.btn-ghost{background:transparent;color:var(--text-light);}
.btn-ghost:hover{background:var(--bg);color:var(--text);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-success{background:var(--success);color:#fff;}
.btn-sm{padding:7px 14px;font-size:12px;}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px;}
.stat-card{background:var(--card);border-radius:var(--radius-sm);padding:22px 24px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;transition:all .2s;border:1px solid transparent;}
.stat-card:hover{box-shadow:var(--shadow-hover);border-color:rgba(139,92,246,.08);}
.stat-icon{font-size:28px;width:52px;height:52px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;background:var(--primary-bg);}
.stat-value{font-size:28px;font-weight:800;color:var(--primary-dark);}
.stat-label{font-size:12px;color:var(--text-light);font-weight:500;}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.product-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:all .3s;border:1.5px solid transparent;}
.product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);border-color:rgba(139,92,246,.1);}
.product-thumb{height:180px;background:linear-gradient(135deg,var(--primary-bg),#FCE7F3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.product-thumb img{width:100%;height:100%;object-fit:cover;}
.product-thumb-placeholder{font-size:56px;opacity:.3;}
.card-badges{position:absolute;top:12px;left:12px;display:flex;gap:6px;flex-wrap:wrap;}
.card-badge{padding:4px 10px;border-radius:99px;font-size:10.5px;font-weight:700;backdrop-filter:blur(8px);}
.badge-active{background:rgba(16,185,129,.12);color:#059669;border:1px solid rgba(16,185,129,.2);}
.badge-draft{background:rgba(245,158,11,.12);color:#D97706;border:1px solid rgba(245,158,11,.2);}
.badge-archived{background:rgba(100,116,139,.12);color:#475569;border:1px solid rgba(100,116,139,.2);}
.badge-country{background:rgba(6,182,212,.1);color:#0891B2;border:1px solid rgba(6,182,212,.15);}
.card-type{position:absolute;bottom:10px;right:12px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);padding:3px 10px;border-radius:99px;font-size:10.5px;font-weight:600;color:var(--text);}
.product-card-body{padding:18px 20px 12px;}
.product-name{font-size:15px;font-weight:700;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.product-brand{font-size:12px;color:var(--primary);font-weight:600;margin-bottom:8px;}
.product-desc{font-size:12px;color:var(--text-light);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5;}
.product-card-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.product-tags{display:flex;gap:6px;flex-wrap:wrap;flex:1;overflow:hidden;}
.mini-tag{padding:3px 8px;background:var(--bg);border-radius:6px;font-size:10px;color:var(--text-light);font-weight:500;white-space:nowrap;}
.card-actions{display:flex;gap:2px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(8px);z-index:200;justify-content:center;align-items:flex-start;padding:24px 20px;overflow-y:auto;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:720px;max-height:none;margin:auto;box-shadow:0 32px 80px rgba(0,0,0,.2);}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:24px 28px 18px;border-bottom:1px solid var(--border);}
.modal-header h3{font-size:18px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-light);padding:4px 8px;border-radius:6px;transition:all .2s;}
.modal-close:hover{background:var(--bg);color:var(--text);}
.modal-body{padding:24px 28px;max-height:70vh;overflow-y:auto;}
.modal-footer{padding:18px 28px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.form-section{margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.form-section:last-child{border-bottom:none;margin-bottom:0;}
.form-section-title{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;margin-bottom:18px;color:var(--primary-dark);}
.badge-icon{width:32px;height:32px;border-radius:10px;background:var(--primary-bg);display:flex;align-items:center;justify-content:center;font-size:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.form-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text-light);}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;font-family:inherit;transition:all .2s;outline:none;background:var(--card);}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(139,92,246,.08);}
.form-textarea{resize:vertical;line-height:1.6;}
.form-hint{font-weight:400;color:var(--text-muted);font-size:11px;}
.req{color:var(--danger);}
.load-existing-bar{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--primary-bg);border-radius:var(--radius-xs);margin-bottom:24px;flex-wrap:wrap;}
.load-existing-bar label{font-size:13px;font-weight:600;white-space:nowrap;}
.load-existing-bar select{flex:1;min-width:200px;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:12px;}
.img-upload-area{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);}
.img-upload-area:hover,.img-upload-area.dragover{border-color:var(--primary);background:var(--primary-bg);}
.img-upload-area .icon{font-size:32px;display:block;margin-bottom:8px;}
.img-upload-area .text{font-size:13px;font-weight:600;color:var(--text);}
.img-upload-area .hint{font-size:11px;color:var(--text-muted);margin-top:4px;}
.img-preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-top:12px;}
.img-preview-item{position:relative;border-radius:var(--radius-xs);overflow:hidden;aspect-ratio:1;}
.img-preview-item img{width:100%;height:100%;object-fit:cover;}
.remove-img{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.img-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#fff;font-size:9px;text-align:center;padding:3px;}
.toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.search-box{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);flex:1;min-width:240px;transition:border .2s;}
.search-box:focus-within{border-color:var(--primary);}
.search-box input{border:none;outline:none;font-size:13px;flex:1;font-family:inherit;background:transparent;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-row label{font-size:12px;font-weight:600;color:var(--text-light);margin-right:4px;}
.pill{padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);font-size:12px;cursor:pointer;font-weight:500;transition:all .2s;color:var(--text-light);}
.pill:hover{border-color:var(--primary-light);color:var(--primary);}
.pill.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.empty-state{text-align:center;padding:60px 24px;}
.empty-state .icon{font-size:56px;margin-bottom:16px;opacity:.6;}
.empty-state h3{font-size:18px;font-weight:700;margin-bottom:8px;}
.empty-state p{color:var(--text-light);font-size:13px;margin-bottom:20px;}
.detail-hero{display:flex;gap:28px;margin-bottom:32px;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.detail-hero-banner{width:340px;min-height:280px;background:linear-gradient(135deg,var(--primary-bg),#FCE7F3);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.detail-hero-banner img{width:100%;height:100%;object-fit:cover;}
.detail-hero-body{padding:28px 28px 28px 0;display:flex;flex-direction:column;justify-content:space-between;flex:1;}
.detail-hero-body h2{font-size:24px;font-weight:800;margin-bottom:2px;}
.brand-name{font-size:15px;color:var(--primary);font-weight:600;margin-bottom:12px;}
.detail-meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;}
.detail-meta-item{font-size:13px;color:var(--text-light);display:flex;align-items:center;gap:4px;}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.detail-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-light);cursor:pointer;margin-bottom:16px;font-weight:500;transition:color .2s;}
.detail-back:hover{color:var(--primary);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.detail-section{background:var(--card);border-radius:var(--radius-sm);padding:24px;box-shadow:var(--shadow);}
.detail-section.full{grid-column:1/-1;}
.section-header{display:flex;align-items:center;gap:12px;font-size:16px;font-weight:700;margin-bottom:16px;}
.section-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.section-content{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;}
.selling-point-item{display:flex;gap:12px;padding:12px 16px;border-radius:var(--radius-xs);background:var(--bg);margin-bottom:8px;align-items:baseline;}
.selling-point-item strong{color:var(--primary);font-size:12px;white-space:nowrap;min-width:60px;}
.content-flow-list{counter-reset:flow;}
.flow-step{display:flex;gap:14px;margin-bottom:16px;position:relative;padding-left:8px;}
.flow-step::before{counter-increment:flow;content:counter(flow);width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.flow-step-content strong{display:block;font-size:14px;margin-bottom:2px;}
.flow-step-content p{font-size:13px;color:var(--text-light);}
.guide-tag{display:inline-block;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:500;margin:3px;}
.tag-do{background:rgba(16,185,129,.08);color:#059669;border:1px solid rgba(16,185,129,.15);}
.tag-dont{background:rgba(239,68,68,.08);color:#DC2626;border:1px solid rgba(239,68,68,.15);}
.tag-caution{background:rgba(245,158,11,.08);color:#D97706;border:1px solid rgba(245,158,11,.15);}
.tag-hashtag{background:rgba(139,92,246,.08);color:var(--primary-dark);border:1px solid rgba(139,92,246,.12);}
.tag-mention{background:var(--primary);color:#fff;font-weight:600;}
.tag-grid{display:flex;flex-wrap:wrap;gap:2px;}
.visual-guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.visual-item{border-radius:var(--radius-xs);overflow:hidden;border:1px solid var(--border);background:var(--bg);}
.visual-item img{width:100%;aspect-ratio:1;object-fit:cover;}
.visual-item .label{padding:6px;text-align:center;font-size:10px;color:var(--text-light);font-weight:500;}
.toast-container{position:fixed;top:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:14px 20px;background:var(--card);border-radius:var(--radius-xs);box-shadow:0 8px 32px rgba(0,0,0,.12);font-size:13px;font-weight:500;animation:slideIn .3s ease;border-left:3px solid var(--primary);}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:300;align-items:center;justify-content:center;}
.confirm-overlay.show{display:flex;}
.confirm-box{background:var(--card);border-radius:var(--radius);padding:32px;max-width:400px;width:90%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.2);}
.confirm-box .icon{font-size:48px;margin-bottom:16px;}
.confirm-box h3{font-size:18px;font-weight:700;margin-bottom:8px;}

function t(key){return (i18n[lang]&&i18n[lang][key])||(i18n.en&&i18n.en[key])||key;}
function setLang(l){lang=l;localStorage.setItem('ppl_lang',l);applyLang();}
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(t(k))el.textContent=t(k);});
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{const k=el.getAttribute('data-i18n-placeholder');if(t(k))el.placeholder=t(k);});
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang')===lang));
  buildCatFilter();buildCountryFilter();
}

// ==================== SUPABASE ====================
function guideToDb(g){
  return {
    id:g.id, product_name:g.name||'', brand:g.brand||'', category:g.category||'cream',
    status:g.status||'active', country:g.country||'KR', how_to_use:g.howToUse||'',
    content_flow:g.contentFlow||'', required_angles:g.visualGuide||'',
    tags_mentions:JSON.stringify({brandTag:g.brandTag,hashtags:g.hashtags,keyMention:g.keyMention}),
    dos:g.dos||'', donts:g.donts||'', caution:g.cautions||'',
    additional_notes:JSON.stringify({productType:g.productType,priceInfo:g.priceInfo,salesChannel:g.salesChannel,startDate:g.startDate,endDate:g.endDate,positioning:g.positioning,sellingPoints:g.sellingPoints,ingredients:g.ingredients,reference:g.reference,mainImage:g.mainImage,refImages:g.refImages}),
    main_image:g.mainImage||null, share_token:g.share_token||null, created_by:currentUser?currentUser.id:null
  };
}
function dbToGuide(d){
  let x={};try{x=JSON.parse(d.additional_notes||'{}');}catch(e){}
  let tg={};try{tg=JSON.parse(d.tags_mentions||'{}');}catch(e){}
  return {id:d.id,name:d.product_name,brand:d.brand,category:d.category,status:d.status,country:d.country,
    howToUse:d.how_to_use,contentFlow:d.content_flow,visualGuide:d.required_angles,
    brandTag:tg.brandTag||'',hashtags:tg.hashtags||'',keyMention:tg.keyMention||'',
    dos:d.dos,donts:d.donts,cautions:d.caution,
    productType:x.productType||'',priceInfo:x.priceInfo||'',salesChannel:x.salesChannel||'',
    startDate:x.startDate||'',endDate:x.endDate||'',positioning:x.positioning||'',
    sellingPoints:x.sellingPoints||'',ingredients:x.ingredients||'',reference:x.reference||'',
    mainImage:x.mainImage||d.main_image,refImages:x.refImages||[],
    share_token:d.share_token,createdAt:d.created_at,updatedAt:d.updated_at};
}
async function syncToSupabase(g){
  if(!currentUser)return;showSync('syncing');
  try{const{error}=await supabase.from('guides').upsert(guideToDb(g),{onConflict:'id'});if(error)throw error;showSync('saved');}
  catch(e){console.error('Sync:',e);showSync('error');}
}
async function loadFromSupabase(){
  try{const{data,error}=await supabase.from('guides').select('*').order('created_at',{ascending:false});
    if(error)throw error;if(data&&data.length)products=data.map(dbToGuide);save();}
  catch(e){console.error('Load:',e);products=JSON.parse(localStorage.getItem('ppl_cosme_v3')||'[]');}
}
async function deleteFromSupabase(id){if(!currentUser)return;try{await supabase.from('guides').delete().eq('id',id);}catch(e){}}
async function loadSharedGuide(token){
  try{
    let{data,error}=await supabase.from('guides').select('*').eq('share_token',token).maybeSingle();
    if(!data){const r=await supabase.from('guides').select('*').eq('id',token).maybeSingle();data=r.data;}
    return data?dbToGuide(data):null;
  }catch(e){console.error('Share:',e);return null;}
}
function showSync(s){
  const el=document.getElementById('syncIndicator');el.className='sync-indicator '+s;
  if(s==='syncing')el.innerHTML='<div class="spinner"></div> 동기화 중...';
  else if(s==='saved')el.innerHTML='✅ 저장됨';
  else if(s==='error')el.innerHTML='⚠️ 동기화 실패';
  if(s!=='syncing')setTimeout(()=>{el.className='sync-indicator';},2500);
}

// ==================== AUTH ====================
let authMode='login';
function switchAuthTab(m){authMode=m;document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&m==='login')||(i===1&&m==='signup')));document.getElementById('authSubmitBtn').textContent=m==='login'?'로그인':'회원가입';document.getElementById('authError').style.display='none';}
async function handleAuth(){
  const email=document.getElementById('authEmail').value.trim(),pw=document.getElementById('authPassword').value;
  if(!email||!pw)return;
  const err=document.getElementById('authError'),load=document.getElementById('authLoading'),form=document.getElementById('authForm');
  err.style.display='none';form.style.display='none';load.classList.add('show');
  try{
    if(authMode==='signup'){
      const{error}=await supabase.auth.signUp({email,password:pw});if(error)throw error;
      const lr=await supabase.auth.signInWithPassword({email,password:pw});
      if(lr.error){load.classList.remove('show');form.style.display='block';switchAuthTab('login');toast('✅ 가입 완료! 로그인하세요.');return;}
    }else{const{error}=await supabase.auth.signInWithPassword({email,password:pw});if(error)throw error;}
  }catch(e){load.classList.remove('show');form.style.display='block';err.textContent=authMode==='login'?'이메일 또는 비밀번호를 확인해주세요.':(e.message||'가입 실패');err.style.display='block';}
}
async function handleLogout(){await supabase.auth.signOut();currentUser=null;products=[];showAuthScreen();}
function showAuthScreen(){document.getElementById('authScreen').style.display='flex';document.getElementById('appSidebar').style.display='none';document.getElementById('appMain').style.display='none';}
async function showApp(){
  document.getElementById('authScreen').style.display='none';document.getElementById('appSidebar').style.display='flex';document.getElementById('appMain').style.display='block';
  if(currentUser){document.getElementById('userBar').style.display='flex';document.getElementById('userEmail').textContent=currentUser.email;document.getElementById('userAvatar').textContent=(currentUser.email||'?')[0].toUpperCase();}
  await loadFromSupabase();applyLang();renderDashboard();updateStats();buildCatFilter();buildCountryFilter();
}

async function showSharedViewer(token){
  isViewerMode=true;document.body.classList.add('viewer-mode');
  document.getElementById('authScreen').style.display='none';document.getElementById('appSidebar').style.display='none';
  document.getElementById('appMain').style.display='block';document.getElementById('appMain').style.marginLeft='0';
  const detail=document.getElementById('page-detail');
  document.querySelectorAll('.page').forEach(pg=>pg.style.display='none');detail.style.display='block';
  detail.innerHTML='<div style="text-align:center;padding:80px 24px;"><div class="spinner" style="width:40px;height:40px;margin:0 auto 16px;border-width:3px;"></div><p style="color:var(--text-light);">가이드를 불러오는 중...</p></div>';
  const guide=await loadSharedGuide(token);
  if(guide){products=[guide];applyLang();viewDetail(guide.id);}
  else{detail.innerHTML='<div class="empty-state"><div class="icon">😢</div><h3>가이드를 찾을 수 없습니다</h3><p>링크가 만료되었거나 잘못된 링크입니다.</p></div>';}
}

// ==================== INIT ====================
async function initApp(){
  const params=new URLSearchParams(window.location.search);
  const shareToken=params.get('share');
  const hash=window.location.hash;
  if(shareToken){await showSharedViewer(shareToken);return;}
  if(hash.startsWith('#view=')){await showSharedViewer(hash.replace('#view=',''));return;}
  const{data:{session}}=await supabase.auth.getSession();
  if(session){currentUser=session.user;await showApp();if(hash.startsWith('#guide='))viewDetail(hash.replace('#guide=',''));}
  else showAuthScreen();
}
supabase.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_IN'&&session){currentUser=session.user;await showApp();}
  else if(event==='SIGNED_OUT'){currentUser=null;if(!isViewerMode)showAuthScreen();}
});

function save(){localStorage.setItem('ppl_cosme_v3',JSON.stringify(products));updateStats();}
function genId(){return 'p'+Date.now()+Math.random().toString(36).substr(2,6);}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function setupDragDrop(areaId,isMultiple){
  const area=document.getElementById(areaId);if(!area)return;
  ['dragenter','dragover'].forEach(ev=>area.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();area.classList.add('dragover');}));
  ['dragleave','drop'].forEach(ev=>area.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();area.classList.remove('dragover');}));
  area.addEventListener('drop',async e=>{
    const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));if(!files.length)return;markDirty();
    if(isMultiple){for(const f of files)tempRefImgs.push(await fileToB64(f));renderRefPreviews();}
    else{tempMainImg=await fileToB64(files[0]);document.getElementById('mainImgPreview').innerHTML=`<div class="img-preview-item"><img src="${tempMainImg}"><button class="remove-img" onclick="tempMainImg=null;this.parentElement.remove();markDirty()">✕</button><div class="img-label">${t('form.mainImg')}</div></div>`;}
  });
}
function fileToB64(f){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(f);});}
async function handleMainImg(e){const f=e.target.files[0];if(!f)return;markDirty();tempMainImg=await fileToB64(f);document.getElementById('mainImgPreview').innerHTML=`<div class="img-preview-item"><img src="${tempMainImg}"><button class="remove-img" onclick="tempMainImg=null;this.parentElement.remove();markDirty()">✕</button><div class="img-label">${t('form.mainImg')}</div></div>`;}
async function handleRefImgs(e){markDirty();for(const f of Array.from(e.target.files))tempRefImgs.push(await fileToB64(f));renderRefPreviews();}
function renderRefPreviews(){document.getElementById('refImgsPreview').innerHTML=tempRefImgs.map((img,i)=>`<div class="img-preview-item"><img src="${img}"><button class="remove-img" onclick="tempRefImgs.splice(${i},1);renderRefPreviews();markDirty()">✕</button><div class="img-label">#${i+1}</div></div>`).join('');}

function showPage(page){document.querySelectorAll('.page').forEach(p=>p.style.display='none');document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));const tgt=document.getElementById('page-'+page);if(tgt)tgt.style.display='block';const nav=document.querySelector(`.nav-item[data-page="${page}"]`);if(nav)nav.classList.add('active');document.querySelector('.sidebar').classList.remove('open');if(page==='dashboard')renderDashboard();if(page==='products'){renderProducts();buildCatFilter();buildCountryFilter();}if(page==='archive')renderArchive();}
function updateStats(){const all=products.length,act=products.filter(p=>p.status==='active').length,dft=products.filter(p=>p.status==='draft').length,arc=products.filter(p=>p.status==='archived').length;const el=id=>document.getElementById(id);if(el('s-total'))el('s-total').textContent=all;if(el('s-active'))el('s-active').textContent=act;if(el('s-draft'))el('s-draft').textContent=dft;if(el('s-archived'))el('s-archived').textContent=arc;if(el('navPC'))el('navPC').textContent=all-arc;if(el('navAC'))el('navAC').textContent=arc;}
function setFilter(type,val,el){if(type==='cat'){filterCat=val;el.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');}else{filterCountry=val;el.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');}renderProducts();}
function buildSelects(){document.getElementById('f-category').innerHTML=['ampoule','cream','pad','toner','mask','etc'].map(c=>`<option value="${c}">${catEmojis[c]} ${t('cat.'+c)}</option>`).join('');document.getElementById('f-status').innerHTML=['active','draft'].map(s=>`<option value="${s}">${t('opt.status.'+s)}</option>`).join('');document.getElementById('f-country').innerHTML=['KR','US','JP','CN','TH','VN','EU'].map(c=>`<option value="${c}">${t('opt.country.'+c)}</option>`).join('');}
function buildCatFilter(){const row=document.getElementById('catFilterRow');if(!row)return;row.innerHTML=`<label data-i18n="filter.category">${t('filter.category')}</label>`+['all','ampoule','cream','pad','toner','mask','etc'].map(c=>`<span class="pill${filterCat===c?' active':''}" onclick="setFilter('cat','${c}',this)">${c==='all'?t('cat.all'):(catEmojis[c]+' '+t('cat.'+c))}</span>`).join('');}
function buildCountryFilter(){const row=document.getElementById('countryFilterRow');if(!row)return;const countries=['all',...new Set(products.map(p=>p.country||'KR'))];row.innerHTML=`<label data-i18n="filter.country">${t('filter.country')}</label>`+countries.map(c=>`<span class="pill${filterCountry===c?' active':''}" onclick="setFilter('country','${c}',this)">${c==='all'?t('country.all'):(countryFlags[c]||'🌏')+' '+c}</span>`).join('');}

// ==================== CARD ====================
function makeCard(p,mode){const catE=catEmojis[p.category]||'📌';const stClass=p.status==='active'?'badge-active':p.status==='draft'?'badge-draft':'badge-archived';const stLabel=t('status.'+p.status);const dateFmt=lang==='ko'?'ko-KR':'en-US';const date=new Date(p.createdAt).toLocaleDateString(dateFmt,{year:'numeric',month:'short',day:'numeric'});const flag=countryFlags[p.country]||'🌏';const thumb=p.mainImage?`<img src="${p.mainImage}">`:`<div class="product-thumb-placeholder">${catE}</div>`;let ab='';if(mode==='archive')ab=`<button class="btn btn-xs btn-success" onclick="event.stopPropagation();restoreProduct('${p.id}')">${t('btn.restore')}</button><button class="btn btn-xs btn-danger" onclick="event.stopPropagation();confirmDelete('${p.id}')">${t('btn.delete')}</button>`;else ab=`<button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();openEditModal('${p.id}')" title="${t('btn.edit')}">✏️</button><button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();archiveProduct('${p.id}')" title="${t('btn.archive')}">🗄️</button><button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();confirmDelete('${p.id}')" title="${t('btn.delete')}" style="color:var(--danger)">🗑️</button>`;return `<div class="product-card" onclick="viewDetail('${p.id}')"><div class="product-thumb">${thumb}<div class="card-badges"><span class="card-badge ${stClass}">${stLabel}</span><span class="card-badge badge-country">${flag} ${p.country||'KR'}</span></div><span class="card-type">${catE} ${t('cat.'+(p.category||'cream'))}</span></div><div class="product-card-body"><div class="product-name">${esc(p.name)}</div><div class="product-brand">${esc(p.brand)}</div><div class="product-desc">${esc(p.positioning||p.sellingPoints||'')}</div></div><div class="product-card-footer"><div class="product-tags"><span class="mini-tag">📅 ${date}</span>${p.priceInfo?`<span class="mini-tag">💰 ${esc(p.priceInfo).substring(0,25)}</span>`:''}</div><div class="card-actions" onclick="event.stopPropagation()">${ab}</div></div></div>`;}
function emptyH(icon,tk,dk,btn){return `<div class="empty-state" style="grid-column:1/-1"><div class="icon">${icon}</div><h3>${t(tk)}</h3><p>${t(dk)}</p>${btn||''}</div>`;}
function renderDashboard(){updateStats();const recent=[...products].filter(p=>p.status!=='archived').sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6);document.getElementById('recentProducts').innerHTML=recent.length?recent.map(p=>makeCard(p,'normal')).join(''):emptyH('💄','empty.noGuide','empty.noGuideDesc',`<button class="btn btn-primary" onclick="loadSampleData()">✨ ${t('nav.sample')}</button>`);}
function renderProducts(){updateStats();const q=(document.getElementById('searchInput')?.value||'').toLowerCase();let list=products.filter(p=>p.status!=='archived');if(filterCat!=='all')list=list.filter(p=>p.category===filterCat);if(filterCountry!=='all')list=list.filter(p=>(p.country||'KR')===filterCountry);if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q));list.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));document.getElementById('productList').innerHTML=list.length?list.map(p=>makeCard(p,'normal')).join(''):emptyH('🔍','empty.noResult','empty.noResultDesc');}
function renderArchive(){const q=(document.getElementById('archiveSearch')?.value||'').toLowerCase();let list=products.filter(p=>p.status==='archived');if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q));list.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));document.getElementById('archiveList').innerHTML=list.length?list.map(p=>makeCard(p,'archive')).join(''):emptyH('🗄️','empty.noArchive','empty.noArchiveDesc');}

// ==================== DETAIL ====================
function viewDetail(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  const catE=catEmojis[p.category]||'📌',stClass=p.status==='active'?'badge-active':p.status==='draft'?'badge-draft':'badge-archived',flag=countryFlags[p.country]||'🌏',notW=`<span style="color:var(--text-muted)">${t('detail.notWritten')}</span>`;
  document.querySelectorAll('.page').forEach(pg=>pg.style.display='none');const detail=document.getElementById('page-detail');detail.style.display='block';
  const spL=(p.sellingPoints||'').split('\n').filter(Boolean);const spH=spL.length?spL.map((s,i)=>`<div class="selling-point-item"><strong>Point ${i+1}</strong><span>${esc(s.replace(/^[•\-]\s*/,''))}</span></div>`).join(''):notW;
  const flL=(p.contentFlow||'').split('\n').filter(Boolean);const flH=flL.length?'<div class="content-flow-list">'+flL.map(fl=>{const m=fl.match(/^\[(.+?)\]\s*(.+)/);return m?`<div class="flow-step"><div class="flow-step-content"><strong>${esc(m[1])}</strong><p>${esc(m[2])}</p></div></div>`:`<div class="flow-step"><div class="flow-step-content"><p>${esc(fl.replace(/^[•\-]\s*/,''))}</p></div></div>`;}).join('')+'</div>':notW;
  const doH=(p.dos||'').split('\n').filter(Boolean).map(d=>`<span class="guide-tag tag-do">✅ ${esc(d.replace(/^[•\-]\s*/,''))}</span>`).join('')||notW;
  const dnH=(p.donts||'').split('\n').filter(Boolean).map(d=>`<span class="guide-tag tag-dont">❌ ${esc(d.replace(/^[•\-]\s*/,''))}</span>`).join('')||notW;
  const haH=(p.hashtags||'').split(/\s+/).filter(h=>h.startsWith('#')).map(h=>`<span class="guide-tag tag-hashtag">${esc(h)}</span>`).join('');
  const caH=(p.cautions||'').split('\n').filter(Boolean).map(c=>`<span class="guide-tag tag-caution">⚠️ ${esc(c.replace(/^[•\-]\s*/,''))}</span>`).join('');
  const viL=(p.visualGuide||'').split('\n').filter(Boolean);const viH=viL.length?`<div class="section-content">${viL.map(v=>'📸 '+esc(v.replace(/^[•\-]\s*/,''))).join('\n')}</div>`:'';
  const riH=(p.refImages&&p.refImages.length)?`<div class="visual-guide-grid">${p.refImages.map((img,i)=>`<div class="visual-item"><img src="${img}"><div class="label">${t('detail.refImages')} ${i+1}</div></div>`).join('')}</div>`:'';
  const banner=p.mainImage?`<img src="${p.mainImage}">`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px;opacity:.4">${catE}</div>`;
  const dateStr=p.startDate?`${p.startDate} ~ ${p.endDate||''}`:'';
  detail.innerHTML=`
    <div class="viewer-watermark">${t('viewer.badge')}</div>
    <div class="detail-back" onclick="showPage('${p.status==='archived'?'archive':'products'}')">${t('detail.back')}</div>
    <div class="detail-hero"><div class="detail-hero-banner">${banner}</div>
      <div class="detail-hero-body"><div>
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
          <span class="card-badge ${stClass}" style="position:static">${t('status.'+p.status)}</span>
          <span class="card-badge badge-country" style="position:static">${flag} ${p.country||'KR'}</span>
          <span class="card-badge" style="position:static;background:rgba(139,92,246,.1);color:var(--primary-dark);border:1px solid rgba(139,92,246,.15)">${catE} ${t('cat.'+(p.category||'cream'))}</span>
          ${p.productType?`<span class="card-badge" style="position:static;background:rgba(6,182,212,.1);color:#0891B2;border:1px solid rgba(6,182,212,.15)">${esc(p.productType)}</span>`:''}
        </div>
        <h2>${esc(p.name)}</h2><div class="brand-name">${esc(p.brand)}</div>
        <div class="detail-meta">${p.priceInfo?`<span class="detail-meta-item">💰 ${esc(p.priceInfo)}</span>`:''}${p.salesChannel?`<span class="detail-meta-item">🏪 ${esc(p.salesChannel)}</span>`:''}${dateStr?`<span class="detail-meta-item">📅 ${dateStr}</span>`:''}</div></div>
        <div class="detail-actions">
          <button class="btn btn-sm btn-outline btn-edit-only" onclick="openEditModal('${p.id}')">✏️ ${t('btn.edit')}</button>
          <button class="btn btn-sm btn-outline" onclick="copyGuideText('${p.id}')">📋 ${t('btn.copyText')}</button>
          <button class="btn btn-sm btn-accent btn-edit-only" onclick="openShareModal('${p.id}')">🔗 ${t('btn.shareLink')}</button>
        </div></div></div>
    <div class="detail-grid">
      ${p.positioning?`<div class="detail-section full"><div class="section-header"><div class="section-icon" style="background:#F5F3FF">✨</div>${t('detail.positioning')}</div><div class="section-content">${esc(p.positioning)}</div></div>`:''}
      <div class="detail-section full"><div class="section-header"><div class="section-icon" style="background:#FEF3C7">⭐</div>${t('detail.sellingPoints')}</div>${spH}</div>
      <div class="detail-section"><div class="section-header"><div class="section-icon" style="background:#ECFDF5">🧪</div>${t('detail.ingredients')}</div><div class="section-content">${p.ingredients?esc(p.ingredients):notW}</div></div>
      <div class="detail-section"><div class="section-header"><div class="section-icon" style="background:#FDF2F8">🤲</div>${t('detail.howToUse')}</div><div class="section-content">${p.howToUse?esc(p.howToUse):notW}</div></div>
      <div class="detail-section full"><div class="section-header"><div class="section-icon" style="background:#EDE9FE">🎬</div>${t('detail.contentFlow')}</div>${flH}</div>
      <div class="detail-section full"><div class="section-header"><div class="section-icon" style="background:#FCE7F3">📸</div>${t('detail.visualGuide')}</div>${viH}${riH?`<div style="margin-top:20px"><div style="font-size:13px;font-weight:600;margin-bottom:12px">📌 ${t('detail.refImages')}</div>${riH}</div>`:''}${!viH&&!riH?notW:''}</div>
      <div class="detail-section"><div class="section-header"><div class="section-icon" style="background:#EFF6FF">📢</div>${t('detail.tags')}</div>${p.brandTag?`<div style="margin-bottom:12px"><span class="guide-tag tag-mention">${esc(p.brandTag)}</span></div>`:''}${haH?`<div class="tag-grid" style="margin-bottom:12px">${haH}</div>`:''}${p.keyMention?`<div style="padding:12px 16px;background:var(--primary-bg);border-radius:var(--radius-xs);border-left:3px solid var(--primary);font-size:14px;font-weight:600;color:var(--primary-dark);line-height:1.8">"${esc(p.keyMention)}"</div>`:''}${!p.brandTag&&!haH&&!p.keyMention?notW:''}</div>
      <div class="detail-section"><div class="section-header"><div class="section-icon" style="background:#ECFDF5">✅</div>${t('detail.dosdonts')}</div>
        <div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:var(--success);margin-bottom:8px">${t('detail.doLabel')}</div><div class="tag-grid">${doH}</div></div>
        <div><div style="font-size:12px;font-weight:700;color:var(--danger);margin-bottom:8px">${t('detail.dontLabel')}</div><div class="tag-grid">${dnH}</div></div>
        ${caH?`<div style="margin-top:14px"><div style="font-size:12px;font-weight:700;color:var(--warning);margin-bottom:8px">${t('detail.cautionLabel')}</div><div class="tag-grid">${caH}</div></div>`:''}</div>
      ${p.reference?`<div class="detail-section full"><div class="section-header"><div class="section-icon" style="background:#F1F5F9">🔗</div>${t('detail.reference')}</div><div class="section-content">${esc(p.reference)}</div></div>`:''}
    </div>`;
}

// ==================== MODAL ====================
const fFields=['f-name','f-brand','f-productType','f-priceInfo','f-salesChannel','f-startDate','f-endDate','f-positioning','f-sellingPoints','f-ingredients','f-howToUse','f-contentFlow','f-visualGuide','f-brandTag','f-hashtags','f-keyMention','f-dos','f-donts','f-cautions','f-reference'];
const dKeys=['name','brand','productType','priceInfo','salesChannel','startDate','endDate','positioning','sellingPoints','ingredients','howToUse','contentFlow','visualGuide','brandTag','hashtags','keyMention','dos','donts','cautions','reference'];

function markDirty(){modalDirty=true;clearTimeout(draftTimer);draftTimer=setTimeout(saveDraft,1000);}
function saveDraft(){const d={};fFields.forEach((id,i)=>{const el=document.getElementById(id);if(el)d[dKeys[i]]=el.value;});d.category=document.getElementById('f-category')?.value;d.mainImage=tempMainImg;localStorage.setItem('ppl_draft',JSON.stringify(d));const ds=document.getElementById('draftStatus');if(ds)ds.textContent='💾 '+t('draft.saved')+' '+new Date().toLocaleTimeString();}
function clearDraft(){localStorage.removeItem('ppl_draft');modalDirty=false;const ds=document.getElementById('draftStatus');if(ds)ds.textContent='';}

function tryCloseModal(){
  if(modalDirty){document.getElementById('cIcon').textContent='⚠️';document.getElementById('cTitle').textContent=t('confirm.unsavedTitle');document.getElementById('cMsg').textContent=t('confirm.unsavedMsg');document.getElementById('cBtn').className='btn btn-danger';document.getElementById('cBtn').textContent=t('confirm.discard');document.getElementById('cBtn').onclick=()=>{clearDraft();closeModal();closeConfirm();};document.getElementById('confirmDialog').classList.add('show');}
  else closeModal();
}
function closeModal(){document.getElementById('productModal').classList.remove('show');modalDirty=false;}

function populateLoadSelect(){document.getElementById('loadExistingSelect').innerHTML=`<option value="">${t('modal.selectGuide')}</option>`+products.map(p=>`<option value="${p.id}">${esc(p.name)} (${esc(p.brand)}) [${countryFlags[p.country]||''}${p.country||'KR'}]</option>`).join('');}
function loadExisting(){const id=document.getElementById('loadExistingSelect').value;if(!id){toast(t('toast.selectFirst'));return;}const p=products.find(x=>x.id===id);if(!p)return;dKeys.forEach((k,i)=>{const el=document.getElementById(fFields[i]);if(el)el.value=p[k]||'';});document.getElementById('f-category').value=p.category||'cream';document.getElementById('f-country').value=p.country||'KR';document.getElementById('f-status').value='draft';tempMainImg=p.mainImage||null;tempRefImgs=[...(p.refImages||[])];const mp=document.getElementById('mainImgPreview');mp.innerHTML=tempMainImg?`<div class="img-preview-item"><img src="${tempMainImg}"><button class="remove-img" onclick="tempMainImg=null;this.parentElement.remove()">✕</button></div>`:'';renderRefPreviews();markDirty();toast(t('toast.loaded'));}

function setupFormListeners(){fFields.forEach(id=>{const el=document.getElementById(id);if(el){el.removeEventListener('input',markDirty);el.addEventListener('input',markDirty);}});['f-category','f-status','f-country'].forEach(id=>{const el=document.getElementById(id);if(el){el.removeEventListener('change',markDirty);el.addEventListener('change',markDirty);}});}
function openAddModal(){document.getElementById('modalTitle').textContent=t('modal.newTitle');document.getElementById('editId').value='';document.getElementById('loadExistingBar').style.display='flex';fFields.forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});document.getElementById('f-category').value='cream';document.getElementById('f-status').value='active';document.getElementById('f-country').value='KR';tempMainImg=null;tempRefImgs=[];document.getElementById('mainImgPreview').innerHTML='';document.getElementById('refImgsPreview').innerHTML='';modalDirty=false;const ds=document.getElementById('draftStatus');if(ds)ds.textContent='';populateLoadSelect();buildSelects();document.getElementById('productModal').classList.add('show');setTimeout(()=>{setupDragDrop('mainImgDrop',false);setupDragDrop('refImgDrop',true);},100);setupFormListeners();}
function openEditModal(id){const p=products.find(x=>x.id===id);if(!p)return;document.getElementById('modalTitle').textContent=t('modal.editTitle');document.getElementById('editId').value=id;document.getElementById('loadExistingBar').style.display='none';dKeys.forEach((k,i)=>{const el=document.getElementById(fFields[i]);if(el)el.value=p[k]||'';});buildSelects();document.getElementById('f-category').value=p.category||'cream';document.getElementById('f-status').value=p.status==='archived'?'active':p.status;document.getElementById('f-country').value=p.country||'KR';tempMainImg=p.mainImage||null;tempRefImgs=[...(p.refImages||[])];document.getElementById('mainImgPreview').innerHTML=tempMainImg?`<div class="img-preview-item"><img src="${tempMainImg}"><button class="remove-img" onclick="tempMainImg=null;this.parentElement.remove();markDirty()">✕</button></div>`:'';renderRefPreviews();modalDirty=false;const ds=document.getElementById('draftStatus');if(ds)ds.textContent='';document.getElementById('productModal').classList.add('show');setTimeout(()=>{setupDragDrop('mainImgDrop',false);setupDragDrop('refImgDrop',true);},100);setupFormListeners();}

async function saveProduct(){const name=document.getElementById('f-name').value.trim(),brand=document.getElementById('f-brand').value.trim();if(!name||!brand){toast(t('toast.inputRequired'));return;}const data={};dKeys.forEach((k,i)=>{data[k]=document.getElementById(fFields[i]).value.trim();});data.category=document.getElementById('f-category').value;data.status=document.getElementById('f-status').value;data.country=document.getElementById('f-country').value;data.mainImage=tempMainImg;data.refImages=[...tempRefImgs];const editId=document.getElementById('editId').value;if(editId){const idx=products.findIndex(p=>p.id===editId);if(idx>=0){products[idx]={...products[idx],...data,updatedAt:new Date().toISOString()};await syncToSupabase(products[idx]);}}else{const ng={id:genId(),...data,share_token:genId(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};products.push(ng);await syncToSupabase(ng);}save();clearDraft();closeModal();renderDashboard();renderProducts();buildCountryFilter();toast(t('toast.saved'));}

// ==================== ACTIONS ====================
async function archiveProduct(id){const p=products.find(x=>x.id===id);if(p){p.status='archived';save();await syncToSupabase(p);renderProducts();renderDashboard();toast(t('toast.archived'));}}
async function restoreProduct(id){const p=products.find(x=>x.id===id);if(p){p.status='active';save();await syncToSupabase(p);renderArchive();renderDashboard();toast(t('toast.restored'));}}
function confirmDelete(id){document.getElementById('cIcon').textContent='🗑️';document.getElementById('cTitle').textContent=t('confirm.deleteTitle');document.getElementById('cMsg').textContent=t('confirm.deleteMsg');document.getElementById('cBtn').className='btn btn-danger';document.getElementById('cBtn').textContent=t('confirm.ok');document.getElementById('cBtn').onclick=async()=>{products=products.filter(p=>p.id!==id);save();await deleteFromSupabase(id);renderProducts();renderArchive();renderDashboard();buildCountryFilter();closeConfirm();toast(t('toast.deleted'));if(document.getElementById('page-detail').style.display==='block')showPage('products');};document.getElementById('confirmDialog').classList.add('show');}
function closeConfirm(){document.getElementById('confirmDialog').classList.remove('show');}

// ==================== SHARE ====================
function openShareModal(id){const p=products.find(x=>x.id===id);const token=(p&&p.share_token)?p.share_token:id;const base=window.location.href.split('?')[0].split('#')[0];document.getElementById('shareLinkInput').value=base+'?share='+token;document.getElementById('shareModal').classList.add('show');}
function closeShareModal(){document.getElementById('shareModal').classList.remove('show');}
function copyShareLink(){const i=document.getElementById('shareLinkInput');i.select();navigator.clipboard.writeText(i.value).then(()=>toast(t('toast.linkCopied')));}

function copyGuideText(id){const p=products.find(x=>x.id===id);if(!p)return;const flag=countryFlags[p.country]||'🌏';const text=`━━━━━━━━━━━━━━━━━━━━━\n💄 ${p.name} — PPL Guide\n━━━━━━━━━━━━━━━━━━━━━\n\n🏷️ Brand: ${p.brand}\n🌏 Country: ${flag} ${p.country}\n💰 Price: ${p.priceInfo||'-'}\n\n✨ Positioning\n${p.positioning||'-'}\n\n⭐ Selling Points\n${p.sellingPoints||'-'}\n\n🎬 Content Flow\n${p.contentFlow||'-'}\n\n📢 Tags: ${p.brandTag||'-'} ${p.hashtags||''}\n\n✅ Do's\n${p.dos||'-'}\n\n❌ Don'ts\n${p.donts||'-'}\n━━━━━━━━━━━━━━━━━━━━━`;navigator.clipboard.writeText(text).then(()=>toast(t('toast.copied'))).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast(t('toast.copied'));});}

function exportData(){const b=new Blob([JSON.stringify(products,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`ppl-guides-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);toast(t('toast.exported'));}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)){for(const item of d){if(!item.share_token)item.share_token=genId();products.push(item);await syncToSupabase(item);}save();renderDashboard();buildCountryFilter();toast(`📂 ${d.length} guides imported`);}}catch{toast('⚠️ Invalid file');}};r.readAsText(f);e.target.value='';}

function loadSampleData(){if(products.length>0){document.getElementById('cIcon').textContent='✨';document.getElementById('cTitle').textContent=t('confirm.sampleTitle');document.getElementById('cMsg').textContent=t('confirm.sampleMsg');document.getElementById('cBtn').className='btn btn-primary';document.getElementById('cBtn').textContent=t('confirm.add');document.getElementById('cBtn').onclick=()=>{addSamples();closeConfirm();};document.getElementById('confirmDialog').classList.add('show');return;}addSamples();}
async function addSamples(){const now=new Date().toISOString();const s=[{id:genId(),name:'리쥬더마 EX 리페어링 크림',brand:'리쥬더마',category:'cream',status:'active',country:'KR',productType:'크림',priceInfo:'20g / 45,000원',salesChannel:'올리브영',startDate:'2026-04-01',endDate:'2026-04-30',positioning:'리쥬란 제조사의 DNA 특허 기술 기반 애프터케어 브랜드',sellingPoints:'c-PDRN 1% 함유\n응급 진정 4배↑\n보습 효과 223%',ingredients:'c-PDRN 1%\nEGF + CICA + 판테놀',howToUse:'꾸덕한 크림 제형\n소량씩 톡톡 두드려 흡수',contentFlow:'[시술 후 올영템] 애프터케어 소개\n[프로 관리러 꿀팁] 전문 연출\n[Before & After] 변화 비교',visualGuide:'시술 후 피부 촬영\n크림 사용 모습 필수',brandTag:'@rejuderma.official',hashtags:'#리쥬더마 #리쥬란 #오리지널PDRN',keyMention:'PDRN의 원조는 리쥬란!',dos:"제품명: '리쥬더마 리페어링 크림'\nc-PDRN: 소문자 필수",donts:"'리쥬란 힐러' 표기 금지\nC-PDRN 대문자 금지",cautions:'광고 표기 필수',reference:'',mainImage:null,refImages:[],share_token:genId(),createdAt:now,updatedAt:now},{id:genId(),name:'Rejuderma EX Repairing Cream',brand:'Rejuderma',category:'cream',status:'active',country:'US',productType:'Cream',priceInfo:'20g / $35',salesChannel:'Amazon',startDate:'2026-04-15',endDate:'2026-05-15',positioning:'Advanced dermo-care by Pharmaresearch',sellingPoints:'c-PDRN 1%\n4x faster calming\n223% hydration boost',ingredients:'c-PDRN 1%\nEGF + CICA + Panthenol',howToUse:'Rich cream\nDot & gently pat',contentFlow:'[Post-Treatment Essential] Must-have\n[Pro Tip] Expert application\n[Before & After] Visible change',visualGuide:'Post-treatment shots\nClose-up application',brandTag:'@rejuderma.official',hashtags:'#Rejuderma #PDRN #KBeauty',keyMention:'The original PDRN by REJURAN',dos:"Name: 'Rejuderma Repairing Cream'\nc-PDRN: always lowercase",donts:'No medical claims\nNo competitor comparison',cautions:'Must include #ad',reference:'',mainImage:null,refImages:[],share_token:genId(),createdAt:new Date(Date.now()-86400000).toISOString(),updatedAt:now}];for(const item of s){products.push(item);await syncToSupabase(item);}save();renderDashboard();buildCatFilter();buildCountryFilter();toast(t('toast.sampleAdded'));}

function toast(msg){const el=document.createElement('div');el.className='toast';el.innerHTML=msg;document.getElementById('toastC').appendChild(el);setTimeout(()=>el.remove(),3000);}

// ==================== EVENTS ====================
window.addEventListener('hashchange',async()=>{const hash=window.location.hash;if(hash.startsWith('#view='))await showSharedViewer(hash.replace('#view=',''));else if(hash.startsWith('#guide='))viewDetail(hash.replace('#guide=',''));});

// Modal overlay click does NOT close (prevents accidental data loss)
document.getElementById('productModal').addEventListener('click',e=>{/* intentionally empty — only X/Cancel can close */});
document.getElementById('shareModal').addEventListener('click',e=>{if(e.target.id==='shareModal')closeShareModal();});
document.getElementById('confirmDialog').addEventListener('click',e=>{if(e.target.id==='confirmDialog')closeConfirm();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('confirmDialog').classList.contains('show'))closeConfirm();else if(document.getElementById('shareModal').classList.contains('show'))closeShareModal();else if(document.getElementById('productModal').classList.contains('show'))tryCloseModal();}});

initApp();
</script>
</body>
